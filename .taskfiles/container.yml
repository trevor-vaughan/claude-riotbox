version: "3"

vars:
  IMAGE_NAME: '{{.IMAGE_NAME | default "riotbox"}}'
  CONTAINER_CMD:
    sh: command -v podman 2>/dev/null || echo docker

tasks:
  default:
    silent: true
    cmd: task container --list

  build:
    desc: Build the RiotBox image (detects your local toolchains)
    cmd: "{{.ROOT_DIR}}/scripts/build.sh"

  rebuild:
    desc: Rebuild from scratch (no cache)
    env:
      CONTAINER_EXTRA_ARGS: "--no-cache"
    cmd: "{{.ROOT_DIR}}/scripts/build.sh"

  update:
    desc: Upgrade only the LLM CLI tools (opencode, Claude Code, plugins) to latest
    env:
      LLM_TOOL_UPDATE:
        sh: date +%s
    cmd: "{{.ROOT_DIR}}/scripts/build.sh"

  clean:
    desc: Remove the RiotBox image
    cmds:
      - "{{.CONTAINER_CMD}} rmi {{.IMAGE_NAME}} 2>/dev/null || true"
      - echo "Image removed"
