version: '3'

vars:
  IMAGE_NAME: '{{.IMAGE_NAME | default "riotbox"}}'
  CONTAINER_CMD:
    sh: command -v podman 2>/dev/null || echo docker

tasks:
  default:
    silent: true
    cmd: task session --list

  ensure-image:
    internal: true
    env:
      CONTAINER_CMD: "{{.CONTAINER_CMD}}"
      IMAGE_NAME: "{{.IMAGE_NAME}}"
    cmd: "{{.ROOT_DIR}}/libexec/ensure-image.sh"

  run:
    desc: Run agent with a task prompt (Claude or opencode, per RIOTBOX_AGENT)
    dir: "{{.USER_WORKING_DIR}}"
    deps: [ensure-image]
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      CONTAINER_CMD: "{{.CONTAINER_CMD}}"
      IMAGE_NAME: "{{.IMAGE_NAME}}"
      ROOT_DIR: "{{.ROOT_DIR}}"
      RIOTBOX_AGENT: "{{.RIOTBOX_AGENT}}"
    cmd: "{{.ROOT_DIR}}/libexec/run.sh {{.ARGS}}"

  resume:
    desc: Continue the last session (Claude or opencode, per RIOTBOX_AGENT)
    dir: "{{.USER_WORKING_DIR}}"
    deps: [ensure-image]
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      CONTAINER_CMD: "{{.CONTAINER_CMD}}"
      IMAGE_NAME: "{{.IMAGE_NAME}}"
      ROOT_DIR: "{{.ROOT_DIR}}"
      RIOTBOX_PROJECTS: "{{.ARGS}}"
      RIOTBOX_AGENT: "{{.RIOTBOX_AGENT}}"
    cmds:
      - "{{.ROOT_DIR}}/libexec/checkpoint.sh"
      - "{{.ROOT_DIR}}/libexec/resume.sh"

  audit:
    desc: Audit untrusted repo (read-only workspace)
    dir: "{{.USER_WORKING_DIR}}"
    deps: [ensure-image]
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      CONTAINER_CMD: "{{.CONTAINER_CMD}}"
      IMAGE_NAME: "{{.IMAGE_NAME}}"
      ROOT_DIR: "{{.ROOT_DIR}}"
      RIOTBOX_AGENT: "{{.RIOTBOX_AGENT}}"
    cmd: "{{.ROOT_DIR}}/libexec/audit.sh {{.ARGS}}"

  nested-run:
    desc: "Run with nested podman support (WARNING: disables SELinux confinement)"
    dir: "{{.USER_WORKING_DIR}}"
    deps: [ensure-image]
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      CONTAINER_CMD: "{{.CONTAINER_CMD}}"
      IMAGE_NAME: "{{.IMAGE_NAME}}"
      ROOT_DIR: "{{.ROOT_DIR}}"
      RIOTBOX_NESTED: "1"
      RIOTBOX_AGENT: "{{.RIOTBOX_AGENT}}"
    cmds:
      - cmd: echo "WARNING{{":"}} Nested container mode disables SELinux confinement (--security-opt label=disable)." >&2
      - cmd: echo "         The container has reduced isolation from the host." >&2
      - cmd: echo "" >&2
      - "{{.ROOT_DIR}}/libexec/run.sh {{.ARGS}}"

  shell:
    desc: Open a shell inside RiotBox
    dir: "{{.USER_WORKING_DIR}}"
    deps: [ensure-image]
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      CONTAINER_CMD: "{{.CONTAINER_CMD}}"
      IMAGE_NAME: "{{.IMAGE_NAME}}"
      ROOT_DIR: "{{.ROOT_DIR}}"
      RIOTBOX_PROJECTS: "{{.ARGS}}"
      RIOTBOX_AGENT: "{{.RIOTBOX_AGENT}}"
    cmds:
      - "{{.ROOT_DIR}}/libexec/checkpoint.sh"
      - "{{.ROOT_DIR}}/libexec/launch.sh bash"

  nested-shell:
    desc: "Shell with nested podman support (WARNING: disables SELinux confinement)"
    dir: "{{.USER_WORKING_DIR}}"
    deps: [ensure-image]
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      CONTAINER_CMD: "{{.CONTAINER_CMD}}"
      IMAGE_NAME: "{{.IMAGE_NAME}}"
      ROOT_DIR: "{{.ROOT_DIR}}"
      RIOTBOX_NESTED: "1"
      RIOTBOX_PROJECTS: "{{.ARGS}}"
      RIOTBOX_AGENT: "{{.RIOTBOX_AGENT}}"
    cmds:
      - cmd: echo "WARNING{{":"}} Nested container mode disables SELinux confinement." >&2
      - "{{.ROOT_DIR}}/libexec/checkpoint.sh"
      - "{{.ROOT_DIR}}/libexec/launch.sh bash"

  socket-run:
    desc: "Run with shared host podman socket (WARNING: grants host root)"
    dir: "{{.USER_WORKING_DIR}}"
    deps: [ensure-image]
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      CONTAINER_CMD: "{{.CONTAINER_CMD}}"
      IMAGE_NAME: "{{.IMAGE_NAME}}"
      ROOT_DIR: "{{.ROOT_DIR}}"
      RIOTBOX_SOCKET: "1"
      RIOTBOX_AGENT: "{{.RIOTBOX_AGENT}}"
    cmds:
      - cmd: echo "WARNING{{":"}} Socket mode bind-mounts the host podman socket into the container." >&2
      - cmd: echo "         This grants the container effective root on the host. Use only" >&2
      - cmd: echo "         with trusted code — this is a broader trust delegation than nested" >&2
      - cmd: echo "         mode. See README \"Container runtime modes\" for alternatives." >&2
      - cmd: echo "" >&2
      - "{{.ROOT_DIR}}/libexec/run.sh {{.ARGS}}"

  socket-shell:
    desc: "Shell with shared host podman socket (WARNING: grants host root)"
    dir: "{{.USER_WORKING_DIR}}"
    deps: [ensure-image]
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      CONTAINER_CMD: "{{.CONTAINER_CMD}}"
      IMAGE_NAME: "{{.IMAGE_NAME}}"
      ROOT_DIR: "{{.ROOT_DIR}}"
      RIOTBOX_SOCKET: "1"
      RIOTBOX_PROJECTS: "{{.ARGS}}"
      RIOTBOX_AGENT: "{{.RIOTBOX_AGENT}}"
    cmds:
      - cmd: echo "WARNING{{":"}} Socket mode bind-mounts the host podman socket into the container." >&2
      - cmd: echo "         This grants the container effective root on the host. Use only" >&2
      - cmd: echo "         with trusted code — this is a broader trust delegation than nested" >&2
      - cmd: echo "         mode. See README \"Container runtime modes\" for alternatives." >&2
      - cmd: echo "" >&2
      - "{{.ROOT_DIR}}/libexec/checkpoint.sh"
      - "{{.ROOT_DIR}}/libexec/launch.sh bash"

  list-sessions:
    desc: List RiotBox sessions with project paths and last-used info
    cmd: "{{.ROOT_DIR}}/libexec/list-sessions.sh"

  remove-session:
    desc: Remove one or more sessions by key or project path (or --all)
    dir: "{{.USER_WORKING_DIR}}"
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      ROOT_DIR: "{{.ROOT_DIR}}"
    cmd: "{{.ROOT_DIR}}/libexec/remove-session.sh {{.ARGS}}"

  reset-session:
    desc: Reset session cache (forces fresh skill/config copy)
    dir: "{{.USER_WORKING_DIR}}"
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      ROOT_DIR: "{{.ROOT_DIR}}"
    cmd: "{{.ROOT_DIR}}/libexec/reset-session.sh {{.ARGS}}"

  overlays:
    desc: List sessions with pending overlay data
    dir: "{{.USER_WORKING_DIR}}"
    cmd: "{{.ROOT_DIR}}/scripts/overlay.sh list"

  overlay-diff:
    desc: Show changes in overlay (vs host project)
    dir: "{{.USER_WORKING_DIR}}"
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      ROOT_DIR: "{{.ROOT_DIR}}"
    cmd: "{{.ROOT_DIR}}/scripts/overlay.sh diff {{.ARGS}}"

  overlay-accept:
    desc: Apply overlay changes to host project
    dir: "{{.USER_WORKING_DIR}}"
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      ROOT_DIR: "{{.ROOT_DIR}}"
    cmd: "{{.ROOT_DIR}}/scripts/overlay.sh accept {{.ARGS}}"

  overlay-reject:
    desc: Discard overlay changes
    dir: "{{.USER_WORKING_DIR}}"
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      ROOT_DIR: "{{.ROOT_DIR}}"
    cmd: "{{.ROOT_DIR}}/scripts/overlay.sh reject {{.ARGS}}"
