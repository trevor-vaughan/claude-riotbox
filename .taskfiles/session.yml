version: '3'

vars:
  IMAGE_NAME: '{{.IMAGE_NAME | default "claude-riotbox"}}'
  CONTAINER_CMD:
    sh: command -v podman 2>/dev/null || echo docker

tasks:
  default:
    desc: List tasks in this module
    silent: true
    cmd: task session --list

  ensure-image:
    internal: true
    env:
      CONTAINER_CMD: "{{.CONTAINER_CMD}}"
      IMAGE_NAME: "{{.IMAGE_NAME}}"
    cmd: "{{.ROOT_DIR}}/.taskfiles/scripts/ensure-image.sh"

  run:
    desc: Run Claude with a task prompt
    dir: "{{.USER_WORKING_DIR}}"
    deps: [ensure-image]
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      CONTAINER_CMD: "{{.CONTAINER_CMD}}"
      IMAGE_NAME: "{{.IMAGE_NAME}}"
      ROOT_DIR: "{{.ROOT_DIR}}"
    cmd: "{{.ROOT_DIR}}/.taskfiles/scripts/run.sh {{.ARGS}}"

  resume:
    desc: Continue the last Claude session
    dir: "{{.USER_WORKING_DIR}}"
    deps: [ensure-image]
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      CONTAINER_CMD: "{{.CONTAINER_CMD}}"
      IMAGE_NAME: "{{.IMAGE_NAME}}"
      ROOT_DIR: "{{.ROOT_DIR}}"
      RIOTBOX_PROJECTS: "{{.ARGS}}"
    cmds:
      - "{{.ROOT_DIR}}/.taskfiles/scripts/checkpoint.sh"
      - "{{.ROOT_DIR}}/.taskfiles/scripts/launch.sh claude --continue"

  audit:
    desc: Audit untrusted repo (read-only workspace)
    dir: "{{.USER_WORKING_DIR}}"
    deps: [ensure-image]
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      CONTAINER_CMD: "{{.CONTAINER_CMD}}"
      IMAGE_NAME: "{{.IMAGE_NAME}}"
      ROOT_DIR: "{{.ROOT_DIR}}"
    cmd: "{{.ROOT_DIR}}/.taskfiles/scripts/audit.sh {{.ARGS}}"

  nested-run:
    desc: "Run with nested podman support (WARNING: disables SELinux confinement)"
    dir: "{{.USER_WORKING_DIR}}"
    deps: [ensure-image]
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      CONTAINER_CMD: "{{.CONTAINER_CMD}}"
      IMAGE_NAME: "{{.IMAGE_NAME}}"
      ROOT_DIR: "{{.ROOT_DIR}}"
      RIOTBOX_NESTED: "1"
    cmds:
      - cmd: echo "WARNING{{":"}} Nested container mode disables SELinux confinement (--security-opt label=disable)." >&2
      - cmd: echo "         The container has reduced isolation from the host." >&2
      - cmd: echo "" >&2
      - "{{.ROOT_DIR}}/.taskfiles/scripts/run.sh {{.ARGS}}"

  shell:
    desc: Open a shell inside the riotbox
    dir: "{{.USER_WORKING_DIR}}"
    deps: [ensure-image]
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      CONTAINER_CMD: "{{.CONTAINER_CMD}}"
      IMAGE_NAME: "{{.IMAGE_NAME}}"
      ROOT_DIR: "{{.ROOT_DIR}}"
      RIOTBOX_PROJECTS: "{{.ARGS}}"
    cmds:
      - "{{.ROOT_DIR}}/.taskfiles/scripts/checkpoint.sh"
      - "{{.ROOT_DIR}}/.taskfiles/scripts/launch.sh bash"

  nested-shell:
    desc: "Shell with nested podman support (WARNING: disables SELinux confinement)"
    dir: "{{.USER_WORKING_DIR}}"
    deps: [ensure-image]
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      CONTAINER_CMD: "{{.CONTAINER_CMD}}"
      IMAGE_NAME: "{{.IMAGE_NAME}}"
      ROOT_DIR: "{{.ROOT_DIR}}"
      RIOTBOX_NESTED: "1"
      RIOTBOX_PROJECTS: "{{.ARGS}}"
    cmds:
      - cmd: echo "WARNING{{":"}} Nested container mode disables SELinux confinement." >&2
      - "{{.ROOT_DIR}}/.taskfiles/scripts/checkpoint.sh"
      - "{{.ROOT_DIR}}/.taskfiles/scripts/launch.sh bash"

  list-sessions:
    desc: List riotbox sessions with project paths and last-used info
    cmd: "{{.ROOT_DIR}}/.taskfiles/scripts/list-sessions.sh"

  remove-session:
    desc: Remove one or more sessions by key or project path (or --all)
    dir: "{{.USER_WORKING_DIR}}"
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      ROOT_DIR: "{{.ROOT_DIR}}"
    cmd: "{{.ROOT_DIR}}/.taskfiles/scripts/remove-session.sh {{.ARGS}}"

  reset-session:
    desc: Reset session cache (forces fresh skill/config copy)
    dir: "{{.USER_WORKING_DIR}}"
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      ROOT_DIR: "{{.ROOT_DIR}}"
    cmd: "{{.ROOT_DIR}}/.taskfiles/scripts/reset-session.sh {{.ARGS}}"

  overlays:
    desc: List sessions with pending overlay data
    dir: "{{.USER_WORKING_DIR}}"
    cmd: "{{.ROOT_DIR}}/scripts/overlay-list.sh"

  overlay-diff:
    desc: Show changes in overlay (vs host project)
    dir: "{{.USER_WORKING_DIR}}"
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      ROOT_DIR: "{{.ROOT_DIR}}"
    cmd: "{{.ROOT_DIR}}/scripts/overlay-diff.sh {{.ARGS}}"

  overlay-accept:
    desc: Apply overlay changes to host project
    dir: "{{.USER_WORKING_DIR}}"
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      ROOT_DIR: "{{.ROOT_DIR}}"
    cmd: "{{.ROOT_DIR}}/scripts/overlay-accept.sh {{.ARGS}}"

  overlay-reject:
    desc: Discard overlay changes
    dir: "{{.USER_WORKING_DIR}}"
    vars:
      ARGS: "{{.ARGS | default .CLI_ARGS}}"
    env:
      ROOT_DIR: "{{.ROOT_DIR}}"
    cmd: "{{.ROOT_DIR}}/scripts/overlay-reject.sh {{.ARGS}}"
