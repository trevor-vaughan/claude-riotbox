version: "3"

includes:
  docker:
    taskfile: .taskfiles/docker.yml
  lint:
    taskfile: .taskfiles/lint.yml
  test:
    taskfile: .taskfiles/test.yml
  release:
    taskfile: .taskfiles/release.yml

vars:
  TEST_DIR: '{{.TEST_DIR | default ".test-output"}}'

dotenv: [".env"]

tasks:
  default:
    silent: true
    cmd: |
      task --list 2>/dev/null | awk '
        /^task:/ { next }
        /^\* / {
          line = substr($0, 3)
          if (!match(line, /:[[:space:]]+/)) next
          name = substr(line, 1, RSTART - 1)
          desc = substr(line, RSTART + RLENGTH)
          gsub(/^[[:space:]]+/, "", desc)
          sep = index(name, ":")
          if (sep > 0) {
            ns = substr(name, 1, sep - 1)
            short = substr(name, sep + 1)
          } else {
            ns = ""
            short = name
          }
          if (short == "default") next
          idx++
          ns_arr[idx] = ns
          short_arr[idx] = short
          desc_arr[idx] = desc
          if (!(ns in ns_seen)) {
            ns_order[++ns_count] = ns
            ns_seen[ns] = 1
          }
        }
        END {
          for (o = 1; o <= ns_count; o++) {
            ns = ns_order[o]
            print ""
            print "----------"
            print (ns == "" ? "tasks" : ns) ":"
            for (i = 1; i <= idx; i++) {
              if (ns_arr[i] == ns) {
                printf "  %-24s %s\n", short_arr[i], desc_arr[i]
              }
            }
            print "----------"
          }
          print ""
        }
      '

  build:
    desc: "Build the RiotBox image (alias for docker:build)"
    cmds:
      - task: docker:build

  rebuild:
    desc: "Rebuild from scratch (alias for docker:rebuild)"
    cmds:
      - task: docker:rebuild

  test:
    desc: "Run integration tests (alias for test:run)"
    cmds:
      - task: test:run
        vars:
          ARGS: "{{.CLI_ARGS}}"

  lint:
    desc: "Alias for lint:run"
    cmds:
      - task: lint:run

  clean:
    desc: Remove build artifacts and test output
    cmd: rm -rf {{.TEST_DIR}}

  check:
    desc: Run all quality gates
    deps: [lint, test, test:lint]
