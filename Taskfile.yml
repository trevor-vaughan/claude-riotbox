version: "3"

includes:
  container:
    taskfile: .taskfiles/container.yml
  lint:
    taskfile: .taskfiles/lint.yml
  test:
    taskfile: .taskfiles/test.yml
  release:
    taskfile: .taskfiles/release.yml

vars:
  TEST_DIR: '{{.TEST_DIR | default ".test-output"}}'

dotenv: [".env"]

tasks:
  default:
    silent: true
    cmd: |
      task --list 2>/dev/null
  build:
    desc: "Build the RiotBox image (alias for container:build)"
    cmds:
      - task: container:build

  rebuild:
    desc: "Rebuild from scratch (alias for container:rebuild)"
    cmds:
      - task: container:rebuild

  update:
    desc: "Upgrade only the LLM CLI tools (alias for container:update)"
    cmds:
      - task: container:update

  test:
    desc: "Run integration tests (alias for test:run)"
    cmds:
      - task: test:run
        vars:
          ARGS: "{{.CLI_ARGS}}"

  lint:
    desc: "Alias for lint:run"
    cmds:
      - task: lint:run

  clean:
    desc: Remove build artifacts and test output
    cmd: rm -rf {{.TEST_DIR}}

  check:
    desc: Run all quality gates
    deps: [lint, test, test:lint]
