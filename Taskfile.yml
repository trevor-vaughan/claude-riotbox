version: '3'

includes:
  docker:
    taskfile: .taskfiles/docker.yml
  session:
    taskfile: .taskfiles/session.yml
  setup:
    taskfile: .taskfiles/setup.yml
  lint:
    taskfile: .taskfiles/lint.yml
  test:
    taskfile: .taskfiles/test.yml
  release:
    taskfile: .taskfiles/release.yml

vars:
  TEST_DIR: '{{.TEST_DIR | default ".test-output"}}'

dotenv: [".env"]

tasks:
  default:
    silent: true
    cmd: |
      task --list 2>/dev/null | awk '
        /^task:/ { next }
        /^\* / {
          line = substr($0, 3)
          if (!match(line, /:[[:space:]]+/)) next
          name = substr(line, 1, RSTART - 1)
          desc = substr(line, RSTART + RLENGTH)
          gsub(/^[[:space:]]+/, "", desc)
          sep = index(name, ":")
          if (sep > 0) {
            ns = substr(name, 1, sep - 1)
            short = substr(name, sep + 1)
          } else {
            ns = ""
            short = name
          }
          if (short == "default") next
          idx++
          ns_arr[idx] = ns
          short_arr[idx] = short
          desc_arr[idx] = desc
          if (!(ns in ns_seen)) {
            ns_order[++ns_count] = ns
            ns_seen[ns] = 1
          }
        }
        END {
          for (o = 1; o <= ns_count; o++) {
            ns = ns_order[o]
            print ""
            print "----------"
            print (ns == "" ? "tasks" : ns) ":"
            for (i = 1; i <= idx; i++) {
              if (ns_arr[i] == ns) {
                printf "  %-24s %s\n", short_arr[i], desc_arr[i]
              }
            }
            print "----------"
          }
          print ""
        }
      '

  build:
    desc: "Alias for docker:build"
    cmds:
      - task: docker:build

  run:
    desc: "Alias for session:run"
    cmds:
      - task: session:run
        vars:
          ARGS: "{{.CLI_ARGS}}"

  shell:
    desc: "Alias for session:shell"
    cmds:
      - task: session:shell
        vars:
          ARGS: "{{.CLI_ARGS}}"

  resume:
    desc: "Alias for session:resume"
    cmds:
      - task: session:resume
        vars:
          ARGS: "{{.CLI_ARGS}}"

  reown:
    desc: "Alias for setup:reown"
    cmds:
      - task: setup:reown
        vars:
          ARGS: "{{.CLI_ARGS}}"

  test:
    desc: "Alias for test:run"
    cmds:
      - task: test:run
        vars:
          ARGS: "{{.CLI_ARGS}}"

  rebuild:
    desc: "Alias for docker:rebuild"
    cmds:
      - task: docker:rebuild

  nested-run:
    desc: "Alias for session:nested-run"
    cmds:
      - task: session:nested-run
        vars:
          ARGS: "{{.CLI_ARGS}}"

  nested-shell:
    desc: "Alias for session:nested-shell"
    cmds:
      - task: session:nested-shell
        vars:
          ARGS: "{{.CLI_ARGS}}"

  session-list:
    desc: "Alias for session:list-sessions"
    cmds:
      - task: session:list-sessions

  session-remove:
    desc: "Alias for session:remove-session"
    cmds:
      - task: session:remove-session
        vars:
          ARGS: "{{.CLI_ARGS}}"

  session-reset:
    desc: "Alias for session:reset-session"
    cmds:
      - task: session:reset-session
        vars:
          ARGS: "{{.CLI_ARGS}}"

  overlays:
    desc: "Alias for session:overlays"
    cmds:
      - task: session:overlays

  overlay-diff:
    desc: "Alias for session:overlay-diff"
    cmds:
      - task: session:overlay-diff
        vars:
          ARGS: "{{.CLI_ARGS}}"

  overlay-accept:
    desc: "Alias for session:overlay-accept"
    cmds:
      - task: session:overlay-accept
        vars:
          ARGS: "{{.CLI_ARGS}}"

  overlay-reject:
    desc: "Alias for session:overlay-reject"
    cmds:
      - task: session:overlay-reject
        vars:
          ARGS: "{{.CLI_ARGS}}"

  mounts:
    desc: "Alias for setup:mounts"
    cmds:
      - task: setup:mounts

  install-hooks:
    desc: "Alias for setup:install-hooks"
    cmds:
      - task: setup:install-hooks
        vars:
          ARGS: "{{.CLI_ARGS}}"

  lint:
    desc: "Alias for lint:run"
    cmds:
      - task: lint:run

  clean:
    desc: Remove build artifacts and test output
    cmd: rm -rf {{.TEST_DIR}}

  check:
    desc: Run all quality gates
    deps: [lint, test, test:lint]
