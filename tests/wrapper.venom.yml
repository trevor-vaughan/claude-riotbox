name: CLI wrapper argument routing tests
vars:
  root: "."
  riotbox_dir: "{{.root}}"
  wrapper_helpers: "{{.root}}/tests/lib/wrapper-test-helpers.sh"

testcases:
  # -- No arguments -> show help --

  - name: No args shows help
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" 2>&1
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "Usage:"

  # -- Path arguments -> shell with projects --

  - name: Single path routes to shell with that path
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" "${TEST_DIR}/projects/foo"
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "shell"
          - result.systemout ShouldContainSubstring "/projects/foo"

  - name: Multiple paths routes to shell with all paths
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" "${TEST_DIR}/projects/foo" "${TEST_DIR}/projects/bar"
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "shell"
          - result.systemout ShouldContainSubstring "/projects/foo"
          - result.systemout ShouldContainSubstring "/projects/bar"

  - name: Dot path routes to shell with dot
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" .
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "shell"
          - result.systemout ShouldContainSubstring "."

  # -- Explicit shell command --

  - name: Shell with no projects routes to shell in CWD
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" shell
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "shell"
          - result.systemout ShouldContainSubstring "."

  - name: Shell with project routes to shell with that project
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" shell "${TEST_DIR}/projects/foo"
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "shell"
          - result.systemout ShouldContainSubstring "/projects/foo"

  # -- run command --

  - name: Run routes prompt and projects
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" run "implement the feature" "${TEST_DIR}/projects/foo"
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "run"
          - result.systemout ShouldContainSubstring "implement the feature"
          - result.systemout ShouldContainSubstring "/projects/foo"

  - name: Run with prompt only (no projects)
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" run "do something"
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "run"
          - result.systemout ShouldContainSubstring "do something"

  # -- resume command --

  - name: Resume with no projects routes to resume in CWD
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" resume
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "resume"
          - result.systemout ShouldContainSubstring "."

  - name: Resume with project
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" resume "${TEST_DIR}/projects/foo"
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "resume"
          - result.systemout ShouldContainSubstring "/projects/foo"

  # -- session-list command --

  - name: Session-list routes to task
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" session-list
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "session-list"

  # -- session-remove command --

  - name: Session-remove routes to task
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" session-remove
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "session-remove"

  - name: Session-remove --all routes correctly
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" session-remove --all
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "session-remove"
          - result.systemout ShouldContainSubstring "--all"

  - name: Session-remove with path routes correctly
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" session-remove "${TEST_DIR}/projects/foo"
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "session-remove"
          - result.systemout ShouldContainSubstring "/projects/foo"

  # -- session-reset command --

  - name: Session-reset routes to task
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" session-reset
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "session-reset"

  - name: Session-reset all force routes correctly
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" session-reset all force
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "session-reset"
          - result.systemout ShouldContainSubstring "all"
          - result.systemout ShouldContainSubstring "force"

  # -- reown command --

  - name: Reown with no flags
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" reown
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "reown"

  - name: Reown with --force flag
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" reown --force
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "reown"
          - result.systemout ShouldContainSubstring "--force"

  # -- Pass-through commands --

  - name: Build passes through to task
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" build
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "build"

  - name: Test passes through to task
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" test
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "test"

  - name: Clean passes through to task
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" clean
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "clean"

  - name: Namespaced task passes through
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" "session:audit" -- "review this"
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "session:audit"

  # -- Edge cases --

  - name: Non-existent path is not treated as a project
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" "/nonexistent/path"
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldNotContainSubstring "shell"
          - result.systemout ShouldContainSubstring "/nonexistent/path"

  - name: Mix of path and non-path is not treated as all-paths
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" "${TEST_DIR}/projects/foo" "not-a-path"
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldNotContainSubstring "shell"

  - name: Separator is passed through for advanced usage
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" "session:nested-run" -- "do something" "${TEST_DIR}/projects/foo"
          print_task_args
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "session:nested-run"
          - result.systemout ShouldContainSubstring "--"
          - result.systemout ShouldContainSubstring "do something"
