          export MOCK_TASK_ARGS PATH="${TEST_DIR}/bin:${PATH}"
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" "/nonexistent/path"
          args="$(cat "${MOCK_TASK_ARGS}")"
          if echo "${args}" | grep -q "shell"; then
            echo "FAIL: should not route to shell"
            exit 1
          fi
          echo "${args}" | grep -q "/nonexistent/path"
        assertions:
          - result.code ShouldEqual 0

