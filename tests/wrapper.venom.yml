name: riotbox dispatcher — argument routing
vars:
  root: "."
  riotbox_dir: "{{.root}}"
  wrapper_helpers: "{{.root}}/tests/lib/wrapper-test-helpers.sh"

testcases:
  # -- No arguments -> show help --

  - name: No args shows help
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" 2>&1
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "Usage:"

  # -- Path arguments -> shell with projects (via the *) default branch) --

  - name: Single path routes to a shell with that project
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" "${TEST_DIR}/projects/foo"
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL checkpoint.sh"
          - result.systemout ShouldContainSubstring "CALL launch.sh bash"
          - result.systemout ShouldContainSubstring "PROJECTS=/"
          - result.systemout ShouldContainSubstring "/projects/foo"

  - name: Multiple paths route to a shell with all projects
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" "${TEST_DIR}/projects/foo" "${TEST_DIR}/projects/bar"
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL launch.sh bash"
          - result.systemout ShouldContainSubstring "/projects/foo"
          - result.systemout ShouldContainSubstring "/projects/bar"

  - name: Dot path routes to a shell with the current directory
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" .
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL launch.sh bash"
          - result.systemout ShouldContainSubstring "PROJECTS=."

  # -- Explicit shell command --

  - name: Shell with no projects defaults RIOTBOX_PROJECTS to the current directory
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" shell
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL checkpoint.sh"
          - result.systemout ShouldContainSubstring "CALL launch.sh bash"
          - result.systemout ShouldContainSubstring "PROJECTS=."

  - name: Shell with a project exports it via RIOTBOX_PROJECTS
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" shell "${TEST_DIR}/projects/foo"
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL launch.sh bash"
          - result.systemout ShouldContainSubstring "PROJECTS=/"
          - result.systemout ShouldContainSubstring "/projects/foo"

  # -- run command --

  - name: Run routes prompt and projects to run.sh
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" run "implement the feature" "${TEST_DIR}/projects/foo"
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL run.sh implement the feature"
          - result.systemout ShouldContainSubstring "/projects/foo"

  - name: Run with prompt only routes to run.sh
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" run "do something"
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL run.sh do something"

  # -- resume command --

  - name: Resume with no projects defaults RIOTBOX_PROJECTS to the current directory
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" resume
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL checkpoint.sh"
          - result.systemout ShouldContainSubstring "CALL resume.sh"
          - result.systemout ShouldContainSubstring "PROJECTS=."

  - name: Resume with a project exports it via RIOTBOX_PROJECTS
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" resume "${TEST_DIR}/projects/foo"
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL resume.sh"
          - result.systemout ShouldContainSubstring "/projects/foo"

  # -- session-list command --

  - name: Session-list routes to list-sessions.sh
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" session-list
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL list-sessions.sh"

  # -- session-remove command --

  - name: Session-remove routes to remove-session.sh
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" session-remove
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL remove-session.sh"

  - name: Session-remove --all routes the flag through
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" session-remove --all
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL remove-session.sh --all"

  - name: Session-remove with a path routes the path through
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" session-remove "${TEST_DIR}/projects/foo"
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL remove-session.sh /"
          - result.systemout ShouldContainSubstring "/projects/foo"

  # -- session-reset command --

  - name: Session-reset routes to reset-session.sh
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" session-reset
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL reset-session.sh"

  - name: Session-reset all force routes the args through
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" session-reset all force
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL reset-session.sh all force"

  # -- reown command --

  - name: Reown with no flags routes to reown-commits.sh
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" reown
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL reown-commits.sh"

  - name: Reown --force routes the flag through
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" reown --force
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL reown-commits.sh --force"

  # -- build command --

  - name: Build routes to build.sh
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" build
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL build.sh"

  # -- Privileged session modes (nested / socket) --

  - name: Nested-run enables RIOTBOX_NESTED and warns on stderr
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" nested-run "do work" 2>"${TEST_DIR}/stderr"
          echo "--- capture ---"
          print_capture
          echo "--- stderr ---"
          cat "${TEST_DIR}/stderr"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL run.sh do work"
          - result.systemout ShouldContainSubstring "NESTED=1"
          - result.systemout ShouldContainSubstring "Nested container mode disables SELinux confinement"

  - name: Nested-shell enables RIOTBOX_NESTED and opens a shell
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" nested-shell 2>/dev/null
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL launch.sh bash"
          - result.systemout ShouldContainSubstring "NESTED=1"

  - name: Socket-run enables RIOTBOX_SOCKET and warns on stderr
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" socket-run "do work" 2>"${TEST_DIR}/stderr"
          echo "--- capture ---"
          print_capture
          echo "--- stderr ---"
          cat "${TEST_DIR}/stderr"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL run.sh do work"
          - result.systemout ShouldContainSubstring "SOCKET=1"
          - result.systemout ShouldContainSubstring "bind-mounts the host podman socket"

  - name: Socket-shell enables RIOTBOX_SOCKET and opens a shell
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" socket-shell 2>/dev/null
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL launch.sh bash"
          - result.systemout ShouldContainSubstring "SOCKET=1"

  # -- Overlay commands --

  - name: Overlays routes to overlay.sh list
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" overlays
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL overlay.sh list"

  - name: Overlay-diff routes to overlay.sh diff with the project
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" overlay-diff "${TEST_DIR}/projects/foo"
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL overlay.sh diff /"
          - result.systemout ShouldContainSubstring "/projects/foo"

  - name: Overlay-accept routes to overlay.sh accept with the project
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" overlay-accept "${TEST_DIR}/projects/foo"
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL overlay.sh accept /"
          - result.systemout ShouldContainSubstring "/projects/foo"

  - name: Overlay-reject routes to overlay.sh reject with the project
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" overlay-reject "${TEST_DIR}/projects/foo"
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL overlay.sh reject /"
          - result.systemout ShouldContainSubstring "/projects/foo"

  # -- mounts command --

  - name: Mounts lists the auto-detected paths and the project/session group
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" mounts
        assertions:
          - result.code ShouldEqual 0
          # detect-mounts group (always-on)
          - result.systemout ShouldContainSubstring "Auto-detected"
          - result.systemout ShouldContainSubstring "/home/llm/.config"
          - result.systemout ShouldContainSubstring "/home/llm/.cache"
          # mount-projects group (per-launch)
          - result.systemout ShouldContainSubstring "Project + session"
          # Static agent host_sync note
          - result.systemout ShouldContainSubstring "Agent host_sync"

  # -- install-hooks command --

  - name: Install-hooks routes flags to install-hooks.sh
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" install-hooks --some-flag
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL install-hooks.sh --some-flag"

  # -- Edge cases --

  - name: Non-existent path is rejected as an unknown command
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" "/nonexistent/path" 2>&1 || echo "EXIT=$?"
        assertions:
          - result.systemout ShouldContainSubstring "unknown command"
          - result.systemout ShouldContainSubstring "EXIT=2"

  - name: Mix of path and non-path is rejected as an unknown command
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" "${TEST_DIR}/projects/foo" "not-a-path" 2>&1 || echo "EXIT=$?"
        assertions:
          - result.systemout ShouldContainSubstring "unknown command"
          - result.systemout ShouldContainSubstring "EXIT=2"

  - name: Separator and following args reach the routed script
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" run -- "do something" "${TEST_DIR}/projects/foo"
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL run.sh -- do something"
          - result.systemout ShouldContainSubstring "/projects/foo"

  # -- Agent flag --

  - name: Agent flag opencode is parsed and exported to the routed script
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" --agent=opencode run "do work"
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "CALL run.sh do work"
          - result.systemout ShouldContainSubstring "AGENT=opencode"

  - name: Agent defaults to claude when neither flag nor env is set
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          unset RIOTBOX_AGENT
          "${TEST_DIR}/app/bin/riotbox" run "do work"
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "AGENT=claude"

  - name: Agent flag rejects unknown values with exit 2
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" --agent=garbage run "x" 2>&1 || echo "EXIT=$?"
        assertions:
          - result.systemout ShouldContainSubstring "must be one of"
          - result.systemout ShouldContainSubstring "EXIT=2"

  - name: RIOTBOX_AGENT env var is honored when no flag is given
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          export RIOTBOX_AGENT=opencode
          "${TEST_DIR}/app/bin/riotbox" run "x"
          print_capture
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "AGENT=opencode"

  # -- agents verb --

  - name: Agents verb lists registered agents
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" agents
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "claude"
          - result.systemout ShouldContainSubstring "opencode"

  - name: Agents verb output is two whitespace-separated columns
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          # Each line must have exactly two whitespace-separated tokens
          # (riotbox name and real binary name). Print 'OK' iff at least
          # one line is present and every line satisfies that, else
          # 'BAD: <line>' so the assertion below catches the first offender.
          "${TEST_DIR}/app/bin/riotbox" agents | awk '
              NF != 2 { print "BAD: " $0; bad=1; exit 0 }
              END { if (NR == 0) print "BAD: empty"; else if (!bad) print "OK" }
          '
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldEqual "OK"

  - name: Agents verb is listed in help output
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/app/bin/riotbox" help
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "agents"

  - name: Invalid --agent value blocks the agents verb (validation runs before dispatch)
    steps:
      - type: exec
        script: |
          source "{{.wrapper_helpers}}"
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          setup_wrapper_test
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cd "${TEST_DIR}/projects"
          # --agent validation runs unconditionally, even for the
          # agent-agnostic `agents` verb. Pin this so a future refactor
          # that moves validation past dispatch (which would silently
          # accept --agent=garbage for info-only verbs) regresses loudly.
          "${TEST_DIR}/app/bin/riotbox" --agent=garbage agents 2>&1 || echo "EXIT=$?"
        assertions:
          - result.systemout ShouldContainSubstring "must be one of"
          - result.systemout ShouldContainSubstring "EXIT=2"
