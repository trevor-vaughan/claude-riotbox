          mkdir -p "${TEST_DIR}/bin" "${TEST_DIR}/projects/foo" "${TEST_DIR}/projects/bar"
          "{{.riotbox_dir}}/install.sh" "${TEST_DIR}/bin"
          MOCK_TASK_ARGS="${TEST_DIR}/task-args"
          cat > "${TEST_DIR}/bin/task" <<'MOCK'
          #!/usr/bin/env bash
          printf '%s\n' "$@" > "${MOCK_TASK_ARGS}"
          MOCK
          chmod +x "${TEST_DIR}/bin/task"
          export MOCK_TASK_ARGS PATH="${TEST_DIR}/bin:${PATH}"
          cd "${TEST_DIR}/projects"
          "${TEST_DIR}/bin/claude-riotbox" "${TEST_DIR}/projects/foo" "${TEST_DIR}/projects/bar"
          args="$(cat "${MOCK_TASK_ARGS}")"
          echo "ARGS: ${args}"
          echo "${args}" | grep -q "shell"
          echo "${args}" | grep -q "${TEST_DIR}/projects/foo"
          echo "${args}" | grep -q "${TEST_DIR}/projects/bar"
        assertions:
          - result.code ShouldEqual 0

