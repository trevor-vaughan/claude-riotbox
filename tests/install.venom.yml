name: install.sh tests
vars:
  root: "."
  riotbox_dir: "{{.root}}"

testcases:
  - name: Creates the wrapper script
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          "{{.riotbox_dir}}/install.sh" "${TEST_DIR}"
          test -f "${TEST_DIR}/claude-riotbox"
        assertions:
          - result.code ShouldEqual 0

  - name: Makes the wrapper executable
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          "{{.riotbox_dir}}/install.sh" "${TEST_DIR}"
          test -x "${TEST_DIR}/claude-riotbox"
        assertions:
          - result.code ShouldEqual 0

  - name: Wrapper references the correct riotbox directory
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          "{{.riotbox_dir}}/install.sh" "${TEST_DIR}"
          grep -q "RIOTBOX_DIR=\"{{.riotbox_dir}}\"" "${TEST_DIR}/claude-riotbox"
        assertions:
          - result.code ShouldEqual 0

  - name: Wrapper routes path arguments to shell command
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          "{{.riotbox_dir}}/install.sh" "${TEST_DIR}"
          grep -q 'run_task shell -- "${cmd}" "$@"' "${TEST_DIR}/claude-riotbox"
        assertions:
          - result.code ShouldEqual 0

  - name: Wrapper shows help when no args given
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          "{{.riotbox_dir}}/install.sh" "${TEST_DIR}"
          grep -q 'usage' "${TEST_DIR}/claude-riotbox"
          grep -q 'exit 0' "${TEST_DIR}/claude-riotbox"
        assertions:
          - result.code ShouldEqual 0

  - name: install.sh is idempotent
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          "{{.riotbox_dir}}/install.sh" "${TEST_DIR}"
          first_hash="$(sha256sum "${TEST_DIR}/claude-riotbox" | awk '{print $1}')"
          "{{.riotbox_dir}}/install.sh" "${TEST_DIR}"
          second_hash="$(sha256sum "${TEST_DIR}/claude-riotbox" | awk '{print $1}')"
          [ "${first_hash}" = "${second_hash}" ]
        assertions:
          - result.code ShouldEqual 0

  - name: Warns when target dir is not in PATH
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          "{{.riotbox_dir}}/install.sh" "${TEST_DIR}/not-in-path" 2>&1
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "not in your PATH"

  - name: Creates target directory if it does not exist
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          NEW_DIR="${TEST_DIR}/nested/dir"
          "{{.riotbox_dir}}/install.sh" "${NEW_DIR}"
          test -x "${NEW_DIR}/claude-riotbox"
        assertions:
          - result.code ShouldEqual 0

  - name: Creates stub config files on fresh install
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          export HOME="${TEST_DIR}"
          export XDG_CONFIG_HOME="${TEST_DIR}/.config"
          "{{.riotbox_dir}}/install.sh" "${TEST_DIR}/bin"
          test -f "${TEST_DIR}/.config/claude-riotbox/config"
          test -f "${TEST_DIR}/.config/claude-riotbox/mounts.conf"
          test -f "${TEST_DIR}/.config/claude-riotbox/plugins.conf"
        assertions:
          - result.code ShouldEqual 0

  - name: Stub configs contain version headers
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          export HOME="${TEST_DIR}"
          export XDG_CONFIG_HOME="${TEST_DIR}/.config"
          "{{.riotbox_dir}}/install.sh" "${TEST_DIR}/bin"
          grep -q '^# riotbox-config-version:' "${TEST_DIR}/.config/claude-riotbox/config"
          grep -q '^# riotbox-config-version:' "${TEST_DIR}/.config/claude-riotbox/mounts.conf"
          grep -q '^# riotbox-config-version:' "${TEST_DIR}/.config/claude-riotbox/plugins.conf"
        assertions:
          - result.code ShouldEqual 0

  - name: Does not overwrite existing config files
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          export HOME="${TEST_DIR}"
          export XDG_CONFIG_HOME="${TEST_DIR}/.config"
          mkdir -p "${TEST_DIR}/.config/claude-riotbox"
          echo "# custom config" > "${TEST_DIR}/.config/claude-riotbox/config"
          "{{.riotbox_dir}}/install.sh" "${TEST_DIR}/bin"
          content="$(cat "${TEST_DIR}/.config/claude-riotbox/config")"
          [ "${content}" = "# custom config" ]
        assertions:
          - result.code ShouldEqual 0

  - name: Warns when shipped config version is newer
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          export HOME="${TEST_DIR}"
          export XDG_CONFIG_HOME="${TEST_DIR}/.config"
          mkdir -p "${TEST_DIR}/.config/claude-riotbox"
          echo "# riotbox-config-version: 0" > "${TEST_DIR}/.config/claude-riotbox/config"
          "{{.riotbox_dir}}/install.sh" "${TEST_DIR}/bin" 2>&1
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "v0"
          # Bumps each time scripts/configs/config gains a riotbox-config-version
          # increment. Don't pin to a specific newer-version number; assert the
          # general "newer version available" shape instead.
          - result.systemout ShouldContainSubstring "available"

  - name: Shows up-to-date when config versions match
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          export HOME="${TEST_DIR}"
          export XDG_CONFIG_HOME="${TEST_DIR}/.config"
          "{{.riotbox_dir}}/install.sh" "${TEST_DIR}/bin" >/dev/null 2>&1
          "{{.riotbox_dir}}/install.sh" "${TEST_DIR}/bin" 2>&1
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "up to date"

  - name: Falls back to unknown when VERSION file is missing
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          export HOME="${TEST_DIR}"
          export XDG_CONFIG_HOME="${TEST_DIR}/.config"
          FAKE_RIOTBOX="${TEST_DIR}/riotbox"
          mkdir -p "${FAKE_RIOTBOX}/scripts/configs"
          cp "{{.riotbox_dir}}/install.sh" "${FAKE_RIOTBOX}/"
          cp "{{.riotbox_dir}}/scripts/configs/"* "${FAKE_RIOTBOX}/scripts/configs/"
          "${FAKE_RIOTBOX}/install.sh" "${TEST_DIR}/bin"
          grep 'RIOTBOX_VERSION="unknown"' "${TEST_DIR}/bin/claude-riotbox"
          echo "version_fallback=pass"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "version_fallback=pass"

  - name: Handles missing stubs directory gracefully
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          export HOME="${TEST_DIR}"
          export XDG_CONFIG_HOME="${TEST_DIR}/.config"
          FAKE_RIOTBOX="${TEST_DIR}/riotbox"
          mkdir -p "${FAKE_RIOTBOX}"
          cp "{{.riotbox_dir}}/install.sh" "${FAKE_RIOTBOX}/"
          echo "0.0.0" > "${FAKE_RIOTBOX}/VERSION"
          "${FAKE_RIOTBOX}/install.sh" "${TEST_DIR}/bin"
          test -x "${TEST_DIR}/bin/claude-riotbox"
          [ ! -f "${TEST_DIR}/.config/claude-riotbox/config" ]
          [ ! -f "${TEST_DIR}/.config/claude-riotbox/mounts.conf" ]
          [ ! -f "${TEST_DIR}/.config/claude-riotbox/plugins.conf" ]
          echo "missing_stubs=pass"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "missing_stubs=pass"

  - name: Does not warn when target dir IS in PATH
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          export HOME="${TEST_DIR}"
          export XDG_CONFIG_HOME="${TEST_DIR}/.config"
          export PATH="${TEST_DIR}/bin:${PATH}"
          "{{.riotbox_dir}}/install.sh" "${TEST_DIR}/bin" 2>&1
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldNotContainSubstring "not in your PATH"
