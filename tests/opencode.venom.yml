          vertex_adc_prompt 2>/tmp/adc-stderr
          echo "GAC=[${GOOGLE_APPLICATION_CREDENTIALS:-unset}]"
          echo "STDERR<<<"; cat /tmp/adc-stderr; echo ">>>"
        assertions:
