  - name: sync-opencode-settings re-copies host config (refreshes session)
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.opencode_helpers}}"
          setup_opencode_sync_test withconfig noauth
          trap 'rm -rf "${TEST_DIR}"' EXIT
          session_dir="${TEST_DIR}/session"
          mkdir -p "${session_dir}"
          # First sync
          "${RIOTBOX_DIR}/agents/opencode/sync-settings.sh" \
              "${FAKE_HOME}/.config/opencode" \
              "${FAKE_HOME}/.local/share/opencode" \
              "${session_dir}" >/dev/null
          # Add a new file to host
          printf '# new\n' > "${FAKE_HOME}/.config/opencode/agents/added.md"
          # Remove an old one
          rm -f "${FAKE_HOME}/.config/opencode/agents/myagent.md"
          # Re-sync
          "${RIOTBOX_DIR}/agents/opencode/sync-settings.sh" \
              "${FAKE_HOME}/.config/opencode" \
              "${FAKE_HOME}/.local/share/opencode" \
              "${session_dir}" >/dev/null
          test -f "${session_dir}/.config-opencode/agents/added.md"
          ! test -f "${session_dir}/.config-opencode/agents/myagent.md"
        assertions:
          - result.code ShouldEqual 0

  - name: sync-opencode-settings skips dangling symlinks without aborting
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.opencode_helpers}}"
          setup_opencode_sync_test withconfig noauth
          trap 'rm -rf "${TEST_DIR}"' EXIT
          # Add a dangling symlink alongside the valid agent
          ln -s /nonexistent/target "${FAKE_HOME}/.config/opencode/agents/dangling.md"
          session_dir="${TEST_DIR}/session"
          mkdir -p "${session_dir}"
          "${RIOTBOX_DIR}/agents/opencode/sync-settings.sh" \
              "${FAKE_HOME}/.config/opencode" \
              "${FAKE_HOME}/.local/share/opencode" \
              "${session_dir}" \
              > "${TEST_DIR}/flags.txt" 2> "${TEST_DIR}/notice.txt"
          # Valid file copied
          test -f "${session_dir}/.config-opencode/agents/myagent.md"
          # Dangling symlink NOT present
          ! test -e "${session_dir}/.config-opencode/agents/dangling.md"
          # Volume flags still emitted (the caller depends on them)
          grep -F ".config-opencode:/home/claude/.config/opencode:z" "${TEST_DIR}/flags.txt"
          grep -F ".local-share-opencode:/home/claude/.local/share/opencode:z" "${TEST_DIR}/flags.txt"
          # No "cannot stat" errors on stderr
          ! grep -F "cannot stat" "${TEST_DIR}/notice.txt"
        assertions:
          - result.code ShouldEqual 0

  - name: sync-opencode-settings excludes opencode-generated plugin artifacts
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.opencode_helpers}}"
          setup_opencode_sync_test withconfig noauth
          trap 'rm -rf "${TEST_DIR}"' EXIT
          # opencode writes these into ~/.config/opencode at startup when
          # plugins are configured. Its own generated .gitignore lists them
          # as disposable. They are platform-specific (native node_modules)
          # and are rebuilt in-container from the persistent cache, so the
          # host copy must NOT carry them across.
          mkdir -p "${FAKE_HOME}/.config/opencode/node_modules/zod"
          printf '{}\n'        > "${FAKE_HOME}/.config/opencode/node_modules/zod/package.json"
          printf '{}\n'        > "${FAKE_HOME}/.config/opencode/package.json"
          printf '{}\n'        > "${FAKE_HOME}/.config/opencode/package-lock.json"
          printf ''            > "${FAKE_HOME}/.config/opencode/bun.lock"
          printf 'node_modules\n' > "${FAKE_HOME}/.config/opencode/.gitignore"
          session_dir="${TEST_DIR}/session"
          mkdir -p "${session_dir}"
          "${RIOTBOX_DIR}/agents/opencode/sync-settings.sh" \
              "${FAKE_HOME}/.config/opencode" \
              "${FAKE_HOME}/.local/share/opencode" \
              "${session_dir}" >/dev/null
          # Real, human-authored config IS copied
          test -f "${session_dir}/.config-opencode/opencode.json"
          test -f "${session_dir}/.config-opencode/agents/myagent.md"
          # Generated artifacts are NOT copied
          ! test -e "${session_dir}/.config-opencode/node_modules"
          ! test -e "${session_dir}/.config-opencode/package.json"
          ! test -e "${session_dir}/.config-opencode/package-lock.json"
          ! test -e "${session_dir}/.config-opencode/bun.lock"
          ! test -e "${session_dir}/.config-opencode/.gitignore"
        assertions:
          - result.code ShouldEqual 0

