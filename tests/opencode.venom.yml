  - name: launch.sh runs vertex-adc-prompt without aborting in non-TTY mode
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          tmp="$(mktemp -d)"
          trap 'rm -rf "${tmp}"' EXIT
          fake_bin="${tmp}/fake-container"
          cat > "${fake_bin}" <<'FAKE'
          #!/usr/bin/env bash
          printf 'arg=%s\n' "$@"
          FAKE
          chmod +x "${fake_bin}"
          # ADC file present in fake HOME; non-TTY in venom should suppress prompt.
          fake_home="${tmp}/home"
          mkdir -p "${fake_home}/.config/gcloud"
          printf '{}\n' > "${fake_home}/.config/gcloud/application_default_credentials.json"
          repo="${tmp}/repo"
          mkdir -p "${repo}"
          ( cd "${repo}" && git init -q \
              && git config user.email t@x && git config user.name t \
              && echo a > a && git add a && git commit -qm i ) >/dev/null
          unset GOOGLE_APPLICATION_CREDENTIALS AWS_SHARED_CREDENTIALS_FILE
          unset AWS_CONFIG_FILE KUBECONFIG RIOTBOX_CREDFILE_VARS
          env -i HOME="${fake_home}" PATH="$PATH" \
              ANTHROPIC_API_KEY="sk-ant-test" \
              CLAUDE_CODE_USE_VERTEX=1 \
              CONTAINER_CMD="${fake_bin}" \
              IMAGE_NAME=fake-img \
              ROOT_DIR="${RIOTBOX_DIR}" \
              RIOTBOX_PROJECTS="${repo}" \
              SESSION_BRANCH=0 \
              bash "${RIOTBOX_DIR}/.taskfiles/scripts/launch.sh" echo hi \
              > "${tmp}/argv.txt" 2>&1
          cat "${tmp}/argv.txt"
        assertions:
          - result.code ShouldEqual 0
          # Non-TTY path emits the notice and does NOT splice the gcp-creds mount.
          - result.systemout ShouldContainSubstring "not a TTY"
          - result.systemout ShouldContainSubstring "arg=-e"
          - result.systemout ShouldContainSubstring "arg=CLAUDE_CODE_USE_VERTEX"
          - result.systemout ShouldNotContainSubstring "/run/secrets/gcp-creds.json"

  - name: launch.sh splices credfile flags into container argv
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          tmp="$(mktemp -d)"
          trap 'rm -rf "${tmp}"' EXIT
          # Fake CONTAINER_CMD that just dumps argv
          fake_bin="${tmp}/fake-container"
          cat > "${fake_bin}" <<'FAKE'
          #!/usr/bin/env bash
          printf 'arg=%s\n' "$@"
          FAKE
          chmod +x "${fake_bin}"
          # Fake credfile and project repo
          printf '{}\n' > "${tmp}/gcp.json"
          repo="${tmp}/repo"
          mkdir -p "${repo}"
          ( cd "${repo}" && git init -q \
              && git config user.email t@x && git config user.name t \
              && echo a > a && git add a && git commit -qm i ) >/dev/null
          unset GOOGLE_APPLICATION_CREDENTIALS AWS_SHARED_CREDENTIALS_FILE
          unset AWS_CONFIG_FILE KUBECONFIG RIOTBOX_CREDFILE_VARS
          export GOOGLE_APPLICATION_CREDENTIALS="${tmp}/gcp.json"
          export ANTHROPIC_API_KEY="sk-ant-test"
          env -i HOME="$HOME" PATH="$PATH" \
              ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
              GOOGLE_APPLICATION_CREDENTIALS="${GOOGLE_APPLICATION_CREDENTIALS}" \
              CONTAINER_CMD="${fake_bin}" \
              IMAGE_NAME=fake-img \
              ROOT_DIR="${RIOTBOX_DIR}" \
              RIOTBOX_PROJECTS="${repo}" \
              SESSION_BRANCH=0 \
              bash "${RIOTBOX_DIR}/.taskfiles/scripts/launch.sh" echo hi \
              > "${tmp}/argv.txt" 2>&1
          cat "${tmp}/argv.txt"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "arg=-e"
          - result.systemout ShouldContainSubstring "arg=ANTHROPIC_API_KEY"
          - result.systemout ShouldContainSubstring "arg=GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/gcp-creds.json"
          - result.systemout ShouldContainSubstring ":/run/secrets/gcp-creds.json:ro,z"

  # -- Integration smoke test (gated by INTEGRATION=1) --
  # Run with: task test ARGS="opencode -- --var INTEGRATION=1"
  # Requires the host to have ANTHROPIC_API_KEY set; auto-skips otherwise.
  #
  # The gating is done in the script body rather than via venom's `skip:`
  # directive. The skip directive's expression evaluation has been
  # unreliable in this codebase for non-trivial conditions. The script
  # emits a sentinel containing "INTEGRATION_" in both the gated and
  # the run-to-completion paths, and the assertion only verifies that
  # the sentinel appeared and the script exited cleanly.

  - name: "Full opencode launch loop builds image and runs a no-op session [integration]"
    steps:
      - type: exec
        script: |
          set -euo pipefail
          INTEGRATION="{{.INTEGRATION}}"
          if [ "${INTEGRATION}" != "1" ]; then
            echo "INTEGRATION_SKIPPED: INTEGRATION=${INTEGRATION:-unset}, run with --var INTEGRATION=1 to enable"
            exit 0
          fi
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "INTEGRATION_SKIPPED: ANTHROPIC_API_KEY not set in host env"
            exit 0
          fi
          REPO="$(mktemp -d)"
          BIN_DIR="$(mktemp -d)"
          trap 'rm -rf "${REPO}" "${BIN_DIR}"' EXIT
          ( cd "${REPO}" && git init -q && \
              git config user.email "test@example.com" && \
              git config user.name "test" && \
              echo "hi" > README.md && \
              git add README.md && git commit -qm "init" )

          # Build is a no-op when the image is already current.
          ( cd "{{.riotbox_dir}}" && task build >/dev/null 2>&1 )

          # Install the wrapper into a tmp bin dir
          "{{.riotbox_dir}}/install.sh" "${BIN_DIR}" >/dev/null

          # Run a trivial prompt with --agent=opencode
          ( cd "${REPO}" && "${BIN_DIR}/claude-riotbox" --agent=opencode \
              run "respond with 'ok' and exit" )

          # Locate the session dir (matches mangle in mount-projects.sh)
          SESSION_KEY="$(printf '%s\n' "${REPO}" | sed 's|/|-|g; s|^-||')"
          SESSION_DIR="${XDG_DATA_HOME:-$HOME/.local/share}/claude-riotbox/${SESSION_KEY}"
          test -d "${SESSION_DIR}/.config-opencode"
          test -d "${SESSION_DIR}/.local-share-opencode"
          test -f "${SESSION_DIR}/.config-opencode/AGENTS.md"
          # Working tree should be clean (no rogue writes to the project)
          ( cd "${REPO}" && test -z "$(git status --porcelain)" )
          echo "INTEGRATION_OK"
        assertions:
          - result.code ShouldEqual 0
          # Matches both INTEGRATION_OK (run) and INTEGRATION_SKIPPED (gated)
          - result.systemout ShouldContainSubstring "INTEGRATION_"
