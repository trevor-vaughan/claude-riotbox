name: install.sh — rootless XDG install
vars:
  root: "."
  riotbox_dir: "{{.root}}"

testcases:
  - name: install lays down app tree and working entrypoint
    steps:
      - type: exec
        script: |
          set -e
          root="$(mktemp -d)"
          trap 'rm -rf "${root}"' EXIT
          export HOME="${root}/home"
          export XDG_DATA_HOME="${HOME}/.local/share"
          export XDG_CONFIG_HOME="${HOME}/.config"
          mkdir -p "${HOME}"
          "{{.riotbox_dir}}/install.sh" >/dev/null
          # app tree present
          test -f "${XDG_DATA_HOME}/riotbox/bin/riotbox"
          test -d "${XDG_DATA_HOME}/riotbox/libexec"
          test -d "${XDG_DATA_HOME}/riotbox/scripts"
          test -d "${XDG_DATA_HOME}/riotbox/agents"
          test -f "${XDG_DATA_HOME}/riotbox/Containerfile"
          # entrypoint symlink resolves into the app tree
          test -L "${HOME}/.local/bin/riotbox"
          real="$(readlink -f "${HOME}/.local/bin/riotbox")"
          test "${real}" = "${XDG_DATA_HOME}/riotbox/bin/riotbox"
          # entrypoint self-locates and runs
          ver="$("${HOME}/.local/bin/riotbox" version)"
          echo "${ver}" | grep -q "riotbox"
          # config stub seeded
          test -f "${XDG_CONFIG_HOME}/riotbox/config"
          echo "INSTALL_OK"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "INSTALL_OK"

  - name: Creates stub config files on fresh install
    steps:
      - type: exec
        script: |
          root="$(mktemp -d)"
          trap 'rm -rf "${root}"' EXIT
          export HOME="${root}/home"
          export XDG_DATA_HOME="${HOME}/.local/share"
          export XDG_CONFIG_HOME="${HOME}/.config"
          mkdir -p "${HOME}"
          "{{.riotbox_dir}}/install.sh" >/dev/null
          test -f "${XDG_CONFIG_HOME}/riotbox/config"
          test -f "${XDG_CONFIG_HOME}/riotbox/mounts.conf"
          test -f "${XDG_CONFIG_HOME}/riotbox/plugins.conf"
        assertions:
          - result.code ShouldEqual 0

  - name: Stub configs contain version headers
    steps:
      - type: exec
        script: |
          root="$(mktemp -d)"
          trap 'rm -rf "${root}"' EXIT
          export HOME="${root}/home"
          export XDG_DATA_HOME="${HOME}/.local/share"
          export XDG_CONFIG_HOME="${HOME}/.config"
          mkdir -p "${HOME}"
          "{{.riotbox_dir}}/install.sh" >/dev/null
          grep -q '^# riotbox-config-version:' "${XDG_CONFIG_HOME}/riotbox/config"
          grep -q '^# riotbox-config-version:' "${XDG_CONFIG_HOME}/riotbox/mounts.conf"
          grep -q '^# riotbox-config-version:' "${XDG_CONFIG_HOME}/riotbox/plugins.conf"
        assertions:
          - result.code ShouldEqual 0

  - name: Does not overwrite existing config files
    steps:
      - type: exec
        script: |
          root="$(mktemp -d)"
          trap 'rm -rf "${root}"' EXIT
          export HOME="${root}/home"
          export XDG_DATA_HOME="${HOME}/.local/share"
          export XDG_CONFIG_HOME="${HOME}/.config"
          mkdir -p "${XDG_CONFIG_HOME}/riotbox"
          echo "# custom config" > "${XDG_CONFIG_HOME}/riotbox/config"
          "{{.riotbox_dir}}/install.sh" >/dev/null
          content="$(cat "${XDG_CONFIG_HOME}/riotbox/config")"
          [ "${content}" = "# custom config" ]
        assertions:
          - result.code ShouldEqual 0

  - name: Warns when shipped config version is newer
    steps:
      - type: exec
        script: |
          root="$(mktemp -d)"
          trap 'rm -rf "${root}"' EXIT
          export HOME="${root}/home"
          export XDG_DATA_HOME="${HOME}/.local/share"
          export XDG_CONFIG_HOME="${HOME}/.config"
          mkdir -p "${XDG_CONFIG_HOME}/riotbox"
          echo "# riotbox-config-version: 0" > "${XDG_CONFIG_HOME}/riotbox/config"
          "{{.riotbox_dir}}/install.sh" 2>&1
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "v0"
          # Bumps each time scripts/configs/config gains a riotbox-config-version
          # increment. Don't pin to a specific newer-version number; assert the
          # general "newer version available" shape instead.
          - result.systemout ShouldContainSubstring "available"

  - name: Shows up-to-date when config versions match
    steps:
      - type: exec
        script: |
          root="$(mktemp -d)"
          trap 'rm -rf "${root}"' EXIT
          export HOME="${root}/home"
          export XDG_DATA_HOME="${HOME}/.local/share"
          export XDG_CONFIG_HOME="${HOME}/.config"
          mkdir -p "${HOME}"
          "{{.riotbox_dir}}/install.sh" >/dev/null 2>&1
          "{{.riotbox_dir}}/install.sh" 2>&1
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "up to date"

  - name: Idempotent install leaves a working entrypoint and app tree
    steps:
      - type: exec
        script: |
          root="$(mktemp -d)"
          trap 'rm -rf "${root}"' EXIT
          export HOME="${root}/home"
          export XDG_DATA_HOME="${HOME}/.local/share"
          export XDG_CONFIG_HOME="${HOME}/.config"
          mkdir -p "${HOME}"
          "{{.riotbox_dir}}/install.sh" >/dev/null 2>&1
          "{{.riotbox_dir}}/install.sh" >/dev/null 2>&1
          test -L "${HOME}/.local/bin/riotbox"
          real="$(readlink -f "${HOME}/.local/bin/riotbox")"
          test "${real}" = "${XDG_DATA_HOME}/riotbox/bin/riotbox"
          test -f "${XDG_DATA_HOME}/riotbox/bin/riotbox"
          test -d "${XDG_DATA_HOME}/riotbox/libexec"
          "${HOME}/.local/bin/riotbox" version | grep -q "riotbox"
          echo "idempotent=pass"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "idempotent=pass"

  - name: Warns when ~/.local/bin is not in PATH
    steps:
      - type: exec
        script: |
          root="$(mktemp -d)"
          trap 'rm -rf "${root}"' EXIT
          export HOME="${root}/home"
          export XDG_DATA_HOME="${HOME}/.local/share"
          export XDG_CONFIG_HOME="${HOME}/.config"
          mkdir -p "${HOME}"
          export PATH="/usr/bin:/bin"
          "{{.riotbox_dir}}/install.sh" 2>&1
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "not in your PATH"

  - name: Does not warn when ~/.local/bin IS in PATH
    steps:
      - type: exec
        script: |
          root="$(mktemp -d)"
          trap 'rm -rf "${root}"' EXIT
          export HOME="${root}/home"
          export XDG_DATA_HOME="${HOME}/.local/share"
          export XDG_CONFIG_HOME="${HOME}/.config"
          mkdir -p "${HOME}"
          export PATH="${HOME}/.local/bin:${PATH}"
          "{{.riotbox_dir}}/install.sh" 2>&1
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldNotContainSubstring "not in your PATH"

  - name: Handles a missing stubs dir gracefully
    steps:
      - type: exec
        script: |
          root="$(mktemp -d)"
          trap 'rm -rf "${root}"' EXIT
          export HOME="${root}/home"
          export XDG_DATA_HOME="${HOME}/.local/share"
          export XDG_CONFIG_HOME="${HOME}/.config"
          mkdir -p "${HOME}"
          # Stage a full copy of the repo MINUS scripts/configs.
          SRC="${root}/src"
          cp -a "{{.riotbox_dir}}/." "${SRC}/"
          rm -rf "${SRC}/scripts/configs"
          "${SRC}/install.sh" >/dev/null
          # App tree + entrypoint still installed.
          test -f "${XDG_DATA_HOME}/riotbox/bin/riotbox"
          test -L "${HOME}/.local/bin/riotbox"
          # No config files seeded (no stubs to copy from).
          [ ! -f "${XDG_CONFIG_HOME}/riotbox/config" ]
          [ ! -f "${XDG_CONFIG_HOME}/riotbox/mounts.conf" ]
          [ ! -f "${XDG_CONFIG_HOME}/riotbox/plugins.conf" ]
          echo "missing_stubs=pass"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "missing_stubs=pass"

  - name: Preserves session dirs and backups on re-install (no data loss)
    steps:
      - type: exec
        script: |
          set -e
          root="$(mktemp -d)"
          trap 'rm -rf "${root}"' EXIT
          export HOME="${root}/home"
          export XDG_DATA_HOME="${HOME}/.local/share"
          export XDG_CONFIG_HOME="${HOME}/.config"
          mkdir -p "${HOME}"
          "{{.riotbox_dir}}/install.sh" >/dev/null
          # Seed a fake session and a fake backup that an upgrade must NOT
          # touch. Sessions are real once they carry a .projects file
          # (mount-projects.sh writes it at launch); backups live under
          # backups/<project>.git/.
          mkdir -p "${XDG_DATA_HOME}/riotbox/myproj"
          echo "/path/to/myproj" > "${XDG_DATA_HOME}/riotbox/myproj/.projects"
          echo "session-data" > "${XDG_DATA_HOME}/riotbox/myproj/important.txt"
          mkdir -p "${XDG_DATA_HOME}/riotbox/backups/myproj.git/refs"
          echo "ref-data" > "${XDG_DATA_HOME}/riotbox/backups/myproj.git/refs/heads"
          # Reinstall. The app tree gets refreshed but session + backup
          # must remain untouched.
          "{{.riotbox_dir}}/install.sh" >/dev/null
          test -f "${XDG_DATA_HOME}/riotbox/myproj/.projects" \
              || { echo "BAD: session .projects gone after reinstall" >&2; exit 1; }
          test "$(cat "${XDG_DATA_HOME}/riotbox/myproj/important.txt")" = "session-data" \
              || { echo "BAD: session payload lost" >&2; exit 1; }
          test "$(cat "${XDG_DATA_HOME}/riotbox/backups/myproj.git/refs/heads")" = "ref-data" \
              || { echo "BAD: backup payload lost" >&2; exit 1; }
          # And the marker file is in place so the next upgrade is
          # unambiguous about which tree it owns.
          test -f "${XDG_DATA_HOME}/riotbox/.riotbox-app" \
              || { echo "BAD: app marker missing" >&2; exit 1; }
          echo "data_preserved=pass"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "data_preserved=pass"

  - name: Refuses to install over a non-RiotBox data dir
    steps:
      - type: exec
        script: |
          root="$(mktemp -d)"
          trap 'rm -rf "${root}"' EXIT
          export HOME="${root}/home"
          export XDG_DATA_HOME="${HOME}/.local/share"
          export XDG_CONFIG_HOME="${HOME}/.config"
          # User has populated the riotbox data dir with their own stuff
          # before installing — no marker, no app paths. We must NOT wipe
          # it; we must refuse with an actionable error.
          mkdir -p "${XDG_DATA_HOME}/riotbox/their-data"
          echo "their work" > "${XDG_DATA_HOME}/riotbox/their-data/notes.txt"
          out="$("{{.riotbox_dir}}/install.sh" 2>&1 || echo "EXIT=$?")"
          echo "${out}"
          case "${out}" in
              *"is not a RiotBox install tree"*"EXIT=1"*) ;;
              *) echo "BAD: should have refused" >&2; exit 1 ;;
          esac
          test "$(cat "${XDG_DATA_HOME}/riotbox/their-data/notes.txt")" = "their work" \
              || { echo "BAD: their data was modified" >&2; exit 1; }
          echo "refusal=pass"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "refusal=pass"

  - name: Accepts a positional BIN_DIR argument
    steps:
      - type: exec
        script: |
          root="$(mktemp -d)"
          trap 'rm -rf "${root}"' EXIT
          export HOME="${root}/home"
          export XDG_DATA_HOME="${HOME}/.local/share"
          export XDG_CONFIG_HOME="${HOME}/.config"
          mkdir -p "${HOME}"
          CUSTOM_BIN="${root}/customer-bin"
          "{{.riotbox_dir}}/install.sh" "${CUSTOM_BIN}" >/dev/null
          # Symlink lands in the custom dir, not the default ~/.local/bin.
          test -L "${CUSTOM_BIN}/riotbox" \
              || { echo "BAD: symlink missing from ${CUSTOM_BIN}" >&2; exit 1; }
          test ! -e "${HOME}/.local/bin/riotbox" \
              || { echo "BAD: default ~/.local/bin/riotbox should be absent" >&2; exit 1; }
          real="$(readlink -f "${CUSTOM_BIN}/riotbox")"
          test "${real}" = "${XDG_DATA_HOME}/riotbox/bin/riotbox" \
              || { echo "BAD: symlink target wrong" >&2; exit 1; }
          echo "bin_dir_arg=pass"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "bin_dir_arg=pass"

  - name: Falls back to unknown version gracefully when VERSION is absent
    steps:
      - type: exec
        script: |
          root="$(mktemp -d)"
          trap 'rm -rf "${root}"' EXIT
          export HOME="${root}/home"
          export XDG_DATA_HOME="${HOME}/.local/share"
          export XDG_CONFIG_HOME="${HOME}/.config"
          mkdir -p "${HOME}"
          # Stage a full copy of the repo without a VERSION file.
          SRC="${root}/src"
          cp -a "{{.riotbox_dir}}/." "${SRC}/"
          rm -f "${SRC}/VERSION"
          "${SRC}/install.sh" >/dev/null
          # Installed entrypoint still runs; dispatcher falls back to "unknown".
          out="$("${HOME}/.local/bin/riotbox" version)"
          echo "${out}" | grep -q "riotbox"
          echo "version_fallback=pass"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "version_fallback=pass"
