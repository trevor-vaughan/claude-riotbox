name: reown-commits.sh tests
vars:
  root: "."
  riotbox_dir: "{{.root}}"
  helpers: "{{.root}}/tests/lib/git-test-helpers.sh"

testcases:
  # -- Happy path --

  - name: Rewrites claude-authored commits to human identity
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          human_commit "checkpoint: pre-claude"
          claude_commit "feature A"
          claude_commit "feature B"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force
          claude_count=$(count_by_author "${CLAUDE_EMAIL}")
          human_count=$(count_by_author "${HUMAN_EMAIL}")
          echo "claude=${claude_count} human=${human_count}"
          [ "${claude_count}" -eq 0 ]
          [ "${human_count}" -eq 4 ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "claude=0 human=4"

  - name: Preserves non-claude commits unchanged
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          human_commit "checkpoint: pre-claude"
          human_commit "human work"
          claude_commit "claude work"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force
          msgs="$(git log --format='%s' --reverse)"
          echo "${msgs}" | grep -qx "initial"
          echo "${msgs}" | grep -qx "checkpoint: pre-claude"
          echo "${msgs}" | grep -qx "human work"
          echo "${msgs}" | grep -qx "claude work"
        assertions:
          - result.code ShouldEqual 0

  - name: Preserves Co-Authored-By trailers
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          human_commit "checkpoint: pre-claude"
          echo "trailer test" >> history.txt
          git add -A
          GIT_AUTHOR_NAME="${CLAUDE_NAME}" GIT_AUTHOR_EMAIL="${CLAUDE_EMAIL}" \
          GIT_COMMITTER_NAME="${CLAUDE_NAME}" GIT_COMMITTER_EMAIL="${CLAUDE_EMAIL}" \
              git commit -m "feature with trailer

          Co-Authored-By: Claude <noreply@anthropic.com>" >/dev/null
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force
          body="$(git log -1 --format='%B')"
          if echo "${body}" | grep -q "Co-Authored-By"; then
            echo "trailer_preserved=true"
          else
            echo "trailer_preserved=false"
            exit 1
          fi
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "trailer_preserved=true"

  # -- Range modes --

  - name: With ref reports correct range in output
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          claude_commit "old claude work"
          ref="$(git rev-parse HEAD)"
          claude_commit "new claude work"
          claude_commit "newest claude work"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force "${ref}" 2>&1
          claude_count=$(count_by_author "${CLAUDE_EMAIL}")
          echo "claude_remaining=${claude_count}"
          [ "${claude_count}" -eq 0 ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "commits since"

  - name: --all rewrites all claude commits on current branch
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          claude_commit "root claude commit"
          human_commit "human commit"
          claude_commit "later claude commit"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force --all
          claude_count=$(count_by_author "${CLAUDE_EMAIL}" main)
          human_count=$(count_by_author "${HUMAN_EMAIL}" main)
          echo "claude=${claude_count} human=${human_count}"
          [ "${claude_count}" -eq 0 ]
          [ "${human_count}" -eq 3 ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "claude=0 human=3"

  - name: Auto-detects checkpoint commit
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          human_commit "checkpoint: pre-claude"
          claude_commit "claude work after checkpoint"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force 2>&1
          claude_count=$(count_by_author "${CLAUDE_EMAIL}")
          echo "claude=${claude_count}"
          [ "${claude_count}" -eq 0 ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "checkpoint"

  - name: Errors when no checkpoint and no ref given
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          claude_commit "some work"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force 2>&1
        assertions:
          - result.code ShouldEqual 1
          - result.systemout ShouldContainSubstring "No checkpoint commit found"

  # -- Backup tags --

  - name: Creates a backup tag before rewriting
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          human_commit "checkpoint: pre-claude"
          claude_commit "work"
          pre_rewrite_head="$(git rev-parse HEAD)"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force
          backup_tag="$(git tag -l 'backup/pre-reown-*' | head -1)"
          echo "backup_tag=${backup_tag}"
          [ -n "${backup_tag}" ]
          [ "$(git rev-parse "${backup_tag}")" = "${pre_rewrite_head}" ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "backup/pre-reown-"

  - name: Backup allows full restore via git reset
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          human_commit "checkpoint: pre-claude"
          claude_commit "work"
          pre_rewrite_head="$(git rev-parse HEAD)"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force
          backup_tag="$(git tag -l 'backup/pre-reown-*' | head -1)"
          git reset --hard "${backup_tag}"
          [ "$(git rev-parse HEAD)" = "${pre_rewrite_head}" ]
          claude_count=$(count_by_author "${CLAUDE_EMAIL}")
          echo "claude_after_restore=${claude_count}"
          [ "${claude_count}" -eq 1 ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "claude_after_restore=1"

  - name: --all only rewrites current branch
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "main initial"
          claude_commit "main claude"
          git checkout -b feature >/dev/null 2>&1
          claude_commit "feature claude"
          git checkout main >/dev/null 2>&1
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force --all
          main_claude=$(count_by_author "${CLAUDE_EMAIL}" main)
          feature_author="$(git log -1 feature --format='%ae')"
          echo "main_claude=${main_claude} feature_author=${feature_author}"
          [ "${main_claude}" -eq 0 ]
          [ "${feature_author}" = "${CLAUDE_EMAIL}" ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "main_claude=0 feature_author=claude@riotbox"

  # -- Remote preservation --

  - name: Preserves the origin remote URL
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          human_commit "checkpoint: pre-claude"
          claude_commit "work"
          git push origin main >/dev/null 2>&1
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force
          remote_url="$(git remote get-url origin)"
          echo "remote=${remote_url}"
          [ "${remote_url}" = "${BARE_DIR}" ]
        assertions:
          - result.code ShouldEqual 0

  - name: Preserves multiple remotes
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          second_bare="${TEST_DIR}/upstream.git"
          git init --bare "${second_bare}" >/dev/null 2>&1
          git remote add upstream "${second_bare}"
          human_commit "initial"
          human_commit "checkpoint: pre-claude"
          claude_commit "work"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force
          [ "$(git remote get-url origin)" = "${BARE_DIR}" ]
          [ "$(git remote get-url upstream)" = "${second_bare}" ]
        assertions:
          - result.code ShouldEqual 0

  - name: Restores upstream tracking after filter-repo wipes remote tracking refs
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          git push origin main >/dev/null 2>&1
          git branch --set-upstream-to=origin/main main
          human_commit "checkpoint: pre-claude"
          claude_commit "work"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force
          tracking="$(git rev-parse --abbrev-ref --symbolic-full-name @{upstream} 2>/dev/null)"
          echo "tracking=${tracking}"
          [ "${tracking}" = "origin/main" ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "tracking=origin/main"

  # -- Edge cases --

  - name: Exits cleanly when no claude commits in range
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          human_commit "checkpoint: pre-claude"
          human_commit "all human"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force 2>&1
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "No Claude-authored commits found"

  - name: Errors on invalid ref
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force "nonexistent-ref" 2>&1
        assertions:
          - result.code ShouldEqual 1
          - result.systemout ShouldContainSubstring "not a valid git ref"

  - name: Errors on unknown flags
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --bogus 2>&1
        assertions:
          - result.code ShouldEqual 1
          - result.systemout ShouldContainSubstring "Unknown option"

  - name: Errors in detached HEAD state
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          human_commit "second"
          git checkout HEAD~1 >/dev/null 2>&1
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force --all 2>&1
        assertions:
          - result.code ShouldEqual 1
          - result.systemout ShouldContainSubstring "detached HEAD"

  - name: Handles interleaved claude and human commits
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "checkpoint: pre-claude"
          claude_commit "claude 1"
          human_commit "human 1"
          claude_commit "claude 2"
          human_commit "human 2"
          claude_commit "claude 3"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force
          claude_count=$(count_by_author "${CLAUDE_EMAIL}")
          human_count=$(count_by_author "${HUMAN_EMAIL}")
          line_count=$(wc -l < history.txt | tr -d ' ')
          echo "claude=${claude_count} human=${human_count} lines=${line_count}"
          [ "${claude_count}" -eq 0 ]
          [ "${human_count}" -eq 6 ]
          [ "${line_count}" -eq 6 ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "claude=0 human=6 lines=6"

  - name: Works when all commits are claude-authored (--all)
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          claude_commit "first"
          claude_commit "second"
          claude_commit "third"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force --all
          claude_count=$(count_by_author "${CLAUDE_EMAIL}" main)
          human_count=$(count_by_author "${HUMAN_EMAIL}" main)
          echo "claude=${claude_count} human=${human_count}"
          [ "${claude_count}" -eq 0 ]
          [ "${human_count}" -eq 3 ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "claude=0 human=3"

  - name: --force skips confirmation
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          human_commit "checkpoint: pre-claude"
          claude_commit "work"
          timeout 10 "{{.riotbox_dir}}/scripts/reown-commits.sh" --force 2>&1
        assertions:
          - result.code ShouldEqual 0

  - name: Without --force prompts and aborts on N
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          human_commit "checkpoint: pre-claude"
          claude_commit "work"
          echo "n" | "{{.riotbox_dir}}/scripts/reown-commits.sh" 2>&1
          claude_count=$(count_by_author "${CLAUDE_EMAIL}")
          echo "claude_after_abort=${claude_count}"
          [ "${claude_count}" -eq 1 ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "Aborted"

  # -- GPG signing --

  - name: Re-signs commits when commit.gpgsign is enabled
    steps:
      - type: exec
        script: |
          command -v gpg &>/dev/null || { echo "SKIP gpg not installed"; exit 0; }
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          export GNUPGHOME="${TEST_DIR}/gnupg"
          mkdir -p "${GNUPGHOME}"
          chmod 700 "${GNUPGHOME}"
          gpg --batch --pinentry-mode loopback --passphrase '' \
              --quick-generate-key "Test User <${HUMAN_EMAIL}>" default default never 2>/dev/null
          key_fp="$(gpg --list-keys --with-colons "${HUMAN_EMAIL}" 2>/dev/null \
              | awk -F: '/^fpr:/ { print $10; exit }')"
          [ -n "${key_fp}" ] || { echo "SKIP failed to generate GPG key"; exit 0; }
          # Create commits BEFORE enabling signing
          human_commit "initial"
          human_commit "checkpoint: pre-claude"
          claude_commit "unsigned claude work"
          # Enable signing
          git config user.signingkey "${key_fp}"
          git config commit.gpgsign true
          git config gpg.program gpg
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force
          sig_status="$(git log -1 --format='%G?')"
          echo "sig_status=${sig_status}"
          [ "${sig_status}" != "N" ]
        assertions:
          - result.code ShouldEqual 0

  - name: Re-signing preserves author dates
    steps:
      - type: exec
        script: |
          command -v gpg &>/dev/null || { echo "SKIP gpg not installed"; exit 0; }
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          export GNUPGHOME="${TEST_DIR}/gnupg"
          mkdir -p "${GNUPGHOME}"
          chmod 700 "${GNUPGHOME}"
          gpg --batch --pinentry-mode loopback --passphrase '' \
              --quick-generate-key "Test User <${HUMAN_EMAIL}>" default default never 2>/dev/null
          key_fp="$(gpg --list-keys --with-colons "${HUMAN_EMAIL}" 2>/dev/null \
              | awk -F: '/^fpr:/ { print $10; exit }')"
          [ -n "${key_fp}" ] || { echo "SKIP failed to generate GPG key"; exit 0; }
          human_commit "initial"
          human_commit "checkpoint: pre-claude"
          echo "dated work" >> history.txt
          git add -A
          GIT_AUTHOR_NAME="${CLAUDE_NAME}" GIT_AUTHOR_EMAIL="${CLAUDE_EMAIL}" \
          GIT_COMMITTER_NAME="${CLAUDE_NAME}" GIT_COMMITTER_EMAIL="${CLAUDE_EMAIL}" \
          GIT_AUTHOR_DATE="2025-01-15T12:00:00" \
          GIT_COMMITTER_DATE="2025-01-15T12:00:00" \
              git commit -m "dated claude work" >/dev/null
          original_date="$(git log -1 --format='%ai')"
          git config user.signingkey "${key_fp}"
          git config commit.gpgsign true
          git config gpg.program gpg
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force
          rewritten_date="$(git log -1 --format='%ai')"
          echo "original=${original_date} rewritten=${rewritten_date}"
          [ "${original_date}" = "${rewritten_date}" ]
        assertions:
          - result.code ShouldEqual 0

  - name: Skips signing when commit.gpgsign is false
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          human_commit "checkpoint: pre-claude"
          claude_commit "work"
          git config commit.gpgsign false
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force 2>&1
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "GPG signing not enabled"

  - name: Errors when gpgsign is true but no signingkey configured
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          human_commit "checkpoint: pre-claude"
          claude_commit "work"
          git config --global commit.gpgsign true
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force 2>&1
        assertions:
          - result.code ShouldEqual 1
          - result.systemout ShouldContainSubstring "no user.signingkey is configured"

  # -- Content integrity --

  - name: Diff between backup and rewritten branch shows no content changes
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          human_commit "checkpoint: pre-claude"
          claude_commit "feature work"
          echo "extra content" >> history.txt
          git add -A
          GIT_AUTHOR_NAME="${CLAUDE_NAME}" GIT_AUTHOR_EMAIL="${CLAUDE_EMAIL}" \
          GIT_COMMITTER_NAME="${CLAUDE_NAME}" GIT_COMMITTER_EMAIL="${CLAUDE_EMAIL}" \
              git commit -m "more feature work" >/dev/null
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force
          backup_tag="$(git tag -l 'backup/pre-reown-*' | head -1)"
          diff_output="$(git diff "${backup_tag}..HEAD" 2>&1)"
          if [ -n "${diff_output}" ]; then
            echo "FAIL: content changed after rewrite"
            echo "${diff_output}"
            exit 1
          fi
          echo "no_content_changes=true"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "no_content_changes=true"
