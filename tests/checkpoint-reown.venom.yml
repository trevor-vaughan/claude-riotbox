name: Checkpoint and reown workflow integration tests
vars:
  root: "."
  riotbox_dir: "{{.root}}"
  helpers: "{{.root}}/tests/lib/git-test-helpers.sh"

testcases:
  # -- Checkpoint creation --

  - name: Checkpoint commits dirty tracked files
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          echo "dirty work" >> dirty.txt
          # Simulate checkpoint logic
          git add -A
          git -c "user.name=${HUMAN_NAME}" -c "user.email=${HUMAN_EMAIL}" \
              commit -m "checkpoint: pre-claude-test" >/dev/null
          git log --format='%s' | grep -q "^checkpoint: pre-claude-"
          git show HEAD -- dirty.txt | grep -q "dirty work"
          echo "checkpoint_created=true"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "checkpoint_created=true"

  - name: Checkpoint does NOT create empty commit when repo is clean
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          head_before="$(git rev-parse HEAD)"
          # Simulate new checkpoint logic — only commit if dirty
          if ! git diff --quiet || ! git diff --cached --quiet || \
             [ -n "$(git ls-files --others --exclude-standard)" ]; then
              git add -A
              git commit -m "checkpoint: pre-claude-test" >/dev/null
          fi
          head_after="$(git rev-parse HEAD)"
          echo "before=${head_before} after=${head_after}"
          [ "${head_before}" = "${head_after}" ]
        assertions:
          - result.code ShouldEqual 0

  - name: Checkpoint stages and includes untracked files
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          echo "brand new file" > newfile.txt
          git add -A
          git -c "user.name=${HUMAN_NAME}" -c "user.email=${HUMAN_EMAIL}" \
              commit -m "checkpoint: pre-claude-test" >/dev/null
          git show HEAD -- newfile.txt | grep -q "brand new file"
          echo "untracked_staged=true"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "untracked_staged=true"

  - name: Checkpoint commit is authored by the human identity
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          echo "dirty" >> dirty.txt
          git add -A
          git -c "user.name=${HUMAN_NAME}" -c "user.email=${HUMAN_EMAIL}" \
              commit -m "checkpoint: pre-claude-test" >/dev/null
          author="$(git log --grep='checkpoint: pre-claude' -1 --format='%ae')"
          echo "author=${author}"
          [ "${author}" = "${HUMAN_EMAIL}" ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "author=human@example.com"

  - name: Checkpoint creates tag pointing to HEAD
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          ts="$(date +%Y%m%d-%H%M%S)-1"
          CHECKPOINT_TAG="claude-checkpoint/${ts}"
          git tag "${CHECKPOINT_TAG}"
          tag_ref="$(git rev-parse "${CHECKPOINT_TAG}")"
          head_ref="$(git rev-parse HEAD)"
          echo "tag_matches_head=$( [ "${tag_ref}" = "${head_ref}" ] && echo true || echo false )"
          [ "${tag_ref}" = "${head_ref}" ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "tag_matches_head=true"

  - name: Checkpoint pushes to a bare backup repo
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          BACKUP_BASE="${TEST_DIR}/backups"
          mkdir -p "${BACKUP_BASE}"
          human_commit "initial"
          ts="$(date +%Y%m%d-%H%M%S)-1"
          CHECKPOINT_TAG="claude-checkpoint/${ts}"
          git tag "${CHECKPOINT_TAG}"
          backup_dir="${BACKUP_BASE}/project.git"
          git clone --bare "${REPO_DIR}" "${backup_dir}" >/dev/null 2>&1
          test -d "${backup_dir}"
          git -C "${backup_dir}" tag -l 'claude-checkpoint/*' | grep -q 'claude-checkpoint/'
          echo "backup_created=true"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "backup_created=true"

  - name: Second checkpoint pushes to existing backup repo
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          BACKUP_BASE="${TEST_DIR}/backups"
          mkdir -p "${BACKUP_BASE}"
          backup_dir="${BACKUP_BASE}/project.git"

          human_commit "initial"
          # First checkpoint
          ts1="$(date +%Y%m%d-%H%M%S)-1"
          git tag "claude-checkpoint/${ts1}"
          git clone --bare "${REPO_DIR}" "${backup_dir}" >/dev/null 2>&1

          human_commit "more human work"
          # Second checkpoint
          ts2="$(date +%Y%m%d-%H%M%S)-2"
          git tag "claude-checkpoint/${ts2}"
          git push --no-verify --force "${backup_dir}" --all >/dev/null 2>&1
          git push --no-verify --force "${backup_dir}" --tags >/dev/null 2>&1

          tag_count="$(git -C "${backup_dir}" tag -l 'claude-checkpoint/*' | wc -l | tr -d ' ')"
          echo "tag_count=${tag_count}"
          [ "${tag_count}" -eq 2 ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "tag_count=2"

  # -- Full workflow: checkpoint -> LLM commits -> reown --

  - name: Reown rewrites llm commits after checkpoint with dirty state
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          echo "unsaved work" >> dirty.txt
          # checkpoint with dirty state
          git add -A
          git -c "user.name=${HUMAN_NAME}" -c "user.email=${HUMAN_EMAIL}" \
              commit -m "checkpoint: pre-claude-test" >/dev/null

          llm_commit "llm feature A"
          llm_commit "llm feature B"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force 2>&1
          llm_count=$(count_by_author "${LLM_EMAIL}")
          echo "llm=${llm_count}"
          [ "${llm_count}" -eq 0 ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "llm=0"

  - name: Reown rewrites llm commits after checkpoint with clean state
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          # No checkpoint commit needed when clean — just tag
          llm_commit "llm work"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force 2>&1
          llm_count=$(count_by_author "${LLM_EMAIL}")
          echo "llm=${llm_count}"
          [ "${llm_count}" -eq 0 ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "llm=0"

  - name: Reown handles multiple sessions (only rewrites remaining llm commits)
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"

          # Session 1: llm work, then reown
          llm_commit "session 1 llm"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force 2>&1

          # Session 2: more llm work
          llm_commit "session 2 llm"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force 2>&1

          llm_count=$(count_by_author "${LLM_EMAIL}")
          human_count=$(count_by_author "${HUMAN_EMAIL}")
          echo "llm=${llm_count} human=${human_count}"
          [ "${llm_count}" -eq 0 ]
          [ "${human_count}" -eq 3 ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "llm=0 human=3"

  - name: Reown does not touch commits before the oldest llm commit
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "pre-llm human work"
          old_hash="$(git rev-parse HEAD)"
          llm_commit "llm work"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force
          new_hash="$(git rev-parse HEAD~1)"
          echo "old=${old_hash} new=${new_hash}"
          [ "${old_hash}" = "${new_hash}" ]
          msg_author="$(git log --format='%ae %s' | grep 'pre-llm human work')"
          echo "pre_llm_author=${msg_author}"
          echo "${msg_author}" | grep -q "^${HUMAN_EMAIL} "
        assertions:
          - result.code ShouldEqual 0

  - name: Reown preserves file content after rewriting
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          echo "feature content" >> feature.txt
          git add -A
          GIT_AUTHOR_NAME="${LLM_NAME}" GIT_AUTHOR_EMAIL="${LLM_EMAIL}" \
          GIT_COMMITTER_NAME="${LLM_NAME}" GIT_COMMITTER_EMAIL="${LLM_EMAIL}" \
              git commit -m "add feature" >/dev/null
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force
          content="$(cat feature.txt)"
          echo "content=${content}"
          [ "${content}" = "feature content" ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "content=feature content"

  - name: Reown exits cleanly with no llm commits
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          human_commit "more human work"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force 2>&1
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "No container-authored commits found"

  # -- Backup and recovery --

  - name: Backup repo survives a llm history rewrite
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          BACKUP_BASE="${TEST_DIR}/backups"
          mkdir -p "${BACKUP_BASE}"
          human_commit "precious work"
          ts="$(date +%Y%m%d-%H%M%S)-1"
          CHECKPOINT_TAG="claude-checkpoint/${ts}"
          git tag "${CHECKPOINT_TAG}"
          backup_dir="${BACKUP_BASE}/project.git"
          git clone --bare "${REPO_DIR}" "${backup_dir}" >/dev/null 2>&1

          llm_commit "llm work"
          # Simulate llm wiping history
          git reset --hard HEAD~1
          # Verify backup still has the checkpoint tag
          git -C "${backup_dir}" tag -l "${CHECKPOINT_TAG}" | grep -q "${CHECKPOINT_TAG}"
          echo "backup_survived=true"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "backup_survived=true"

  - name: Project is recoverable from backup after history destruction
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          BACKUP_BASE="${TEST_DIR}/backups"
          mkdir -p "${BACKUP_BASE}"
          human_commit "precious work"
          ts="$(date +%Y%m%d-%H%M%S)-1"
          CHECKPOINT_TAG="claude-checkpoint/${ts}"
          git tag "${CHECKPOINT_TAG}"
          backup_dir="${BACKUP_BASE}/project.git"
          git clone --bare "${REPO_DIR}" "${backup_dir}" >/dev/null 2>&1

          llm_commit "llm work"
          original_head="$(git rev-parse "${CHECKPOINT_TAG}")"
          # Simulate llm wiping everything
          git reset --hard HEAD~1
          # Recover via backup
          git fetch "${backup_dir}" "refs/tags/${CHECKPOINT_TAG}:refs/tags/${CHECKPOINT_TAG}" >/dev/null 2>&1
          git reset --hard "${CHECKPOINT_TAG}"
          git log --format='%s' | grep -q "precious work"
          [ "$(git rev-parse HEAD)" = "${original_head}" ]
          echo "recovered=true"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "recovered=true"

  - name: Reown backup tag allows restore to pre-reown state
    steps:
      - type: exec
        script: |
          source "{{.helpers}}"
          init_test_repo
          trap 'rm -rf "${TEST_DIR}"' EXIT
          human_commit "initial"
          llm_commit "llm work"
          pre_reown_head="$(git rev-parse HEAD)"
          "{{.riotbox_dir}}/scripts/reown-commits.sh" --force
          backup_tag="$(git tag -l 'backup/pre-reown-*' | head -1)"
          [ -n "${backup_tag}" ]
          git reset --hard "${backup_tag}"
          [ "$(git rev-parse HEAD)" = "${pre_reown_head}" ]
          llm_count=$(count_by_author "${LLM_EMAIL}")
          echo "llm_after_restore=${llm_count}"
          [ "${llm_count}" -eq 1 ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "llm_after_restore=1"
