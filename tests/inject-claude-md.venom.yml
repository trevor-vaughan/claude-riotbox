name: inject-claude-md.sh tests
vars:
  root: "."
  riotbox_dir: "{{.root}}"
  in_riotbox: "no"
  inject_helpers: "{{.root}}/tests/lib/inject-test-helpers.sh"

testcases:
  # -- Creation --

  - name: Creates CLAUDE.md when it does not exist
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test "You are in a riotbox."
          trap 'rm -rf "${TEST_DIR}"' EXIT
          run_inject
          test -f "${CLAUDE_MD}"
        assertions:
          - result.code ShouldEqual 0

  - name: Created file contains the prompt content
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test "You are in a riotbox."
          trap 'rm -rf "${TEST_DIR}"' EXIT
          run_inject
          grep -F "You are in a riotbox." "${CLAUDE_MD}"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "You are in a riotbox."

  - name: Created file has begin and end markers
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test "You are in a riotbox."
          trap 'rm -rf "${TEST_DIR}"' EXIT
          run_inject
          grep -F "<!-- BEGIN RIOTBOX -->" "${CLAUDE_MD}"
          grep -F "<!-- END RIOTBOX -->" "${CLAUDE_MD}"
        assertions:
          - result.code ShouldEqual 0

  # -- Idempotency --

  - name: Running twice produces exactly one riotbox block
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test "You are in a riotbox."
          trap 'rm -rf "${TEST_DIR}"' EXIT
          run_inject
          run_inject
          count=$(grep -cF "<!-- BEGIN RIOTBOX -->" "${CLAUDE_MD}")
          echo "begin_count=${count}"
          [ "${count}" -eq 1 ]
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "begin_count=1"

  - name: Running twice produces the same content
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test "You are in a riotbox."
          trap 'rm -rf "${TEST_DIR}"' EXIT
          run_inject
          first="$(cat "${CLAUDE_MD}")"
          run_inject
          second="$(cat "${CLAUDE_MD}")"
          [ "${first}" = "${second}" ] && echo "content_matches=true"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "content_matches=true"

  # -- Replacement --

  - name: Updates riotbox block when prompt content changes
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test "You are in a riotbox."
          trap 'rm -rf "${TEST_DIR}"' EXIT
          run_inject
          echo "Updated prompt." > "${PROMPT_FILE}"
          run_inject
          grep -F "Updated prompt." "${CLAUDE_MD}"
          ! grep -F "You are in a riotbox." "${CLAUDE_MD}"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "Updated prompt."

  - name: Old prompt content is fully removed after update
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test "$(printf 'Line one.\nLine two.\nLine three.\n')"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          run_inject
          echo "Replacement." > "${PROMPT_FILE}"
          run_inject
          ! grep -F "Line one." "${CLAUDE_MD}"
          ! grep -F "Line two." "${CLAUDE_MD}"
          ! grep -F "Line three." "${CLAUDE_MD}"
          grep -F "Replacement." "${CLAUDE_MD}"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "Replacement."

  # -- Preservation of existing content --

  - name: Preserves content before the riotbox block
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test "You are in a riotbox."
          trap 'rm -rf "${TEST_DIR}"' EXIT
          echo "# My Project Notes" > "${CLAUDE_MD}"
          run_inject
          grep -F "# My Project Notes" "${CLAUDE_MD}"
          grep -F "You are in a riotbox." "${CLAUDE_MD}"
        assertions:
          - result.code ShouldEqual 0

  - name: Preserves content after the riotbox block on re-inject
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test "You are in a riotbox."
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cat > "${CLAUDE_MD}" <<'CONTENT'
          # Project header

          <!-- BEGIN RIOTBOX -->
          Old prompt.
          <!-- END RIOTBOX -->

          # User notes
          Remember to use pytest.
          CONTENT
          run_inject
          grep -F "Project header" "${CLAUDE_MD}"
          grep -F "User notes" "${CLAUDE_MD}"
          grep -F "Remember to use pytest." "${CLAUDE_MD}"
          grep -F "You are in a riotbox." "${CLAUDE_MD}"
          ! grep -F "Old prompt." "${CLAUDE_MD}"
        assertions:
          - result.code ShouldEqual 0

  - name: Preserves content both before and after the block
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test "You are in a riotbox."
          trap 'rm -rf "${TEST_DIR}"' EXIT
          cat > "${CLAUDE_MD}" <<'CONTENT'
          # Before

          <!-- BEGIN RIOTBOX -->
          Original.
          <!-- END RIOTBOX -->

          # After
          CONTENT
          run_inject
          grep -F "Before" "${CLAUDE_MD}"
          grep -F "After" "${CLAUDE_MD}"
          grep -F "You are in a riotbox." "${CLAUDE_MD}"
        assertions:
          - result.code ShouldEqual 0

  # -- Prompt file resolution --

  - name: Ignores user-writable ~/.riotbox/CLAUDE.md (prompt injection defense)
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          mkdir -p "${TEST_DIR}/config" "${TEST_DIR}/.riotbox"
          echo "Injected override." > "${TEST_DIR}/.riotbox/CLAUDE.md"
          unset RIOTBOX_PROMPT
          # Temporarily hide the system default so no prompt is resolved
          saved_etc="/etc/riotbox/CLAUDE.md"
          moved_etc=false
          if [ -f "${saved_etc}" ]; then
            sudo mv "${saved_etc}" "${saved_etc}.bak" 2>/dev/null && moved_etc=true
          fi
          CLAUDE_CONFIG_DIR="${TEST_DIR}/config" \
          HOME="${TEST_DIR}" \
            source "{{.riotbox_dir}}/container/inject-claude-md.sh"
          if [ "${moved_etc}" = true ]; then
            sudo mv "${saved_etc}.bak" "${saved_etc}" 2>/dev/null
          fi
          # ~/.riotbox/CLAUDE.md must NOT be picked up
          if [ -f "${TEST_DIR}/config/CLAUDE.md" ] && grep -qF "Injected override." "${TEST_DIR}/config/CLAUDE.md"; then
            echo "FAIL: user-writable path was resolved"
            exit 1
          fi
          echo "user_override_ignored=true"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "user_override_ignored=true"

  - name: "Resolves system default prompt from /etc/riotbox/ [riotbox-only]"
    skip:
      - "in_riotbox ShouldEqual yes"
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          mkdir -p "${TEST_DIR}/config"
          unset RIOTBOX_PROMPT
          CLAUDE_CONFIG_DIR="${TEST_DIR}/config" \
          HOME="${TEST_DIR}" \
            source "{{.riotbox_dir}}/container/inject-claude-md.sh"
          grep -F "<!-- BEGIN RIOTBOX -->" "${TEST_DIR}/config/CLAUDE.md"
          echo "system_default_resolved=true"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "system_default_resolved=true"

  - name: Does nothing when no prompt file is available
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          mkdir -p "${TEST_DIR}/config" "${TEST_DIR}/empty-home"
          unset RIOTBOX_PROMPT
          saved_etc="/etc/riotbox/CLAUDE.md"
          moved_etc=false
          if [ -f "${saved_etc}" ]; then
            sudo mv "${saved_etc}" "${saved_etc}.bak" 2>/dev/null && moved_etc=true
          fi
          CLAUDE_CONFIG_DIR="${TEST_DIR}/config" \
          HOME="${TEST_DIR}/empty-home" \
            source "{{.riotbox_dir}}/container/inject-claude-md.sh"
          if [ "${moved_etc}" = true ]; then
            sudo mv "${saved_etc}.bak" "${saved_etc}" 2>/dev/null
          fi
          if [ -f "${TEST_DIR}/config/CLAUDE.md" ]; then
            echo "FAIL: CLAUDE.md should not have been created"
            exit 1
          fi
          echo "no_file_created=true"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "no_file_created=true"

  # -- Edge cases --

  - name: Handles empty existing CLAUDE.md
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test "You are in a riotbox."
          trap 'rm -rf "${TEST_DIR}"' EXIT
          touch "${CLAUDE_MD}"
          run_inject
          grep -F "<!-- BEGIN RIOTBOX -->" "${CLAUDE_MD}"
          grep -F "You are in a riotbox." "${CLAUDE_MD}"
        assertions:
          - result.code ShouldEqual 0

  - name: Handles multi-line prompt content
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test "$(printf 'First line.\nSecond line.\nThird line.\n')"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          run_inject
          grep -F "First line." "${CLAUDE_MD}"
          grep -F "Second line." "${CLAUDE_MD}"
          grep -F "Third line." "${CLAUDE_MD}"
        assertions:
          - result.code ShouldEqual 0

  - name: Markers are not duplicated across multiple runs with changing content
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test "You are in a riotbox."
          trap 'rm -rf "${TEST_DIR}"' EXIT
          run_inject
          echo "V2." > "${PROMPT_FILE}"
          run_inject
          echo "V3." > "${PROMPT_FILE}"
          run_inject
          begin_count=$(grep -cF "<!-- BEGIN RIOTBOX -->" "${CLAUDE_MD}")
          end_count=$(grep -cF "<!-- END RIOTBOX -->" "${CLAUDE_MD}")
          echo "begin=${begin_count} end=${end_count}"
          [ "${begin_count}" -eq 1 ] && [ "${end_count}" -eq 1 ]
          grep -F "V3." "${CLAUDE_MD}"
          ! grep -F "V2." "${CLAUDE_MD}"
          ! grep -F "You are in a riotbox." "${CLAUDE_MD}"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "begin=1 end=1"
