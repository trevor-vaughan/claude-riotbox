name: inject-claude-md.sh tests
vars:
  root: "."
  riotbox_dir: "{{.root}}"
  in_riotbox: "no"
  inject_helpers: "{{.root}}/tests/lib/inject-test-helpers.sh"

testcases:
  # -- Rendering --

  - name: Renders prompt to managed policy path
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test "You are in a riotbox."
          trap 'rm -rf "${TEST_DIR}"' EXIT
          run_inject
          test -f "${MANAGED_POLICY_MD}"
        assertions:
          - result.code ShouldEqual 0

  - name: Rendered file contains the prompt content
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test "You are in a riotbox."
          trap 'rm -rf "${TEST_DIR}"' EXIT
          run_inject
          grep -F "You are in a riotbox." "${MANAGED_POLICY_MD}"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "You are in a riotbox."

  - name: Handles multi-line prompt content
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test "$(printf 'First line.\nSecond line.\nThird line.\n')"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          run_inject
          grep -F "First line." "${MANAGED_POLICY_MD}"
          grep -F "Second line." "${MANAGED_POLICY_MD}"
          grep -F "Third line." "${MANAGED_POLICY_MD}"
        assertions:
          - result.code ShouldEqual 0

  # -- Template substitution --

  - name: Substitutes OS_PRETTY_NAME template variable
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test 'Running on {{OS_PRETTY_NAME}}.'
          trap 'rm -rf "${TEST_DIR}"' EXIT
          run_inject
          # Should not contain the raw template placeholder
          ! grep -F '{{OS_PRETTY_NAME}}' "${MANAGED_POLICY_MD}"
          # Should contain an actual OS name (at minimum "Linux")
          grep -q 'Running on .' "${MANAGED_POLICY_MD}"
          echo "template_substituted=true"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "template_substituted=true"

  # -- Idempotency --

  - name: Running twice overwrites rather than appends
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test "You are in a riotbox."
          trap 'rm -rf "${TEST_DIR}"' EXIT
          run_inject
          first="$(cat "${MANAGED_POLICY_MD}")"
          run_inject
          second="$(cat "${MANAGED_POLICY_MD}")"
          [ "${first}" = "${second}" ] && echo "content_matches=true"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "content_matches=true"

  - name: Updated prompt replaces previous content completely
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test "You are in a riotbox."
          trap 'rm -rf "${TEST_DIR}"' EXIT
          run_inject
          echo "Updated prompt." > "${PROMPT_FILE}"
          run_inject
          grep -F "Updated prompt." "${MANAGED_POLICY_MD}"
          ! grep -F "You are in a riotbox." "${MANAGED_POLICY_MD}"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "Updated prompt."

  # -- Build-time render --

  - name: Skips rendering when build-time managed policy already exists
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          mkdir -p "${TEST_DIR}/managed-policy"
          # Simulate a build-time rendered managed policy
          echo "Build-time content." > "${TEST_DIR}/managed-policy/CLAUDE.md"
          unset RIOTBOX_PROMPT
          export RIOTBOX_MANAGED_POLICY_DIR="${TEST_DIR}/managed-policy"
          HOME="${TEST_DIR}" \
            source "{{.riotbox_dir}}/container/inject-claude-md.sh"
          # Content must be unchanged (not overwritten)
          grep -F "Build-time content." "${TEST_DIR}/managed-policy/CLAUDE.md"
          echo "build_time_preserved=true"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "build_time_preserved=true"

  - name: Explicit RIOTBOX_PROMPT overrides build-time render
    steps:
      - type: exec
        script: |
          export RIOTBOX_DIR="{{.riotbox_dir}}"
          source "{{.inject_helpers}}"
          setup_inject_test "Custom override prompt."
          trap 'rm -rf "${TEST_DIR}"' EXIT
          # Pre-populate managed policy to simulate build-time render
          echo "Build-time content." > "${MANAGED_POLICY_MD}"
          run_inject
          # Must be replaced with the custom prompt
          grep -F "Custom override prompt." "${MANAGED_POLICY_MD}"
          ! grep -F "Build-time content." "${MANAGED_POLICY_MD}"
          echo "override_applied=true"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "override_applied=true"

  # -- Prompt file resolution --

  - name: Ignores user-writable ~/.riotbox/CLAUDE.md (prompt injection defense)
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          mkdir -p "${TEST_DIR}/managed-policy" "${TEST_DIR}/.riotbox"
          echo "Injected override." > "${TEST_DIR}/.riotbox/CLAUDE.md"
          unset RIOTBOX_PROMPT
          export RIOTBOX_MANAGED_POLICY_DIR="${TEST_DIR}/managed-policy"
          # Temporarily hide the system default so no prompt is resolved
          saved_etc="/etc/riotbox/CLAUDE.md"
          moved_etc=false
          if [ -f "${saved_etc}" ]; then
            sudo mv "${saved_etc}" "${saved_etc}.bak" 2>/dev/null && moved_etc=true
          fi
          HOME="${TEST_DIR}" \
            source "{{.riotbox_dir}}/container/inject-claude-md.sh"
          if [ "${moved_etc}" = true ]; then
            sudo mv "${saved_etc}.bak" "${saved_etc}" 2>/dev/null
          fi
          # ~/.riotbox/CLAUDE.md must NOT be picked up
          if [ -f "${TEST_DIR}/managed-policy/CLAUDE.md" ] && grep -qF "Injected override." "${TEST_DIR}/managed-policy/CLAUDE.md"; then
            echo "FAIL: user-writable path was resolved"
            exit 1
          fi
          echo "user_override_ignored=true"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "user_override_ignored=true"

  - name: "Resolves system default prompt from /etc/riotbox/ [riotbox-only]"
    skip:
      - "in_riotbox ShouldEqual yes"
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          mkdir -p "${TEST_DIR}/managed-policy"
          unset RIOTBOX_PROMPT
          export RIOTBOX_MANAGED_POLICY_DIR="${TEST_DIR}/managed-policy"
          HOME="${TEST_DIR}" \
            source "{{.riotbox_dir}}/container/inject-claude-md.sh"
          test -f "${TEST_DIR}/managed-policy/CLAUDE.md"
          echo "system_default_resolved=true"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "system_default_resolved=true"

  - name: Does nothing when no prompt file is available
    steps:
      - type: exec
        script: |
          TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEST_DIR}"' EXIT
          mkdir -p "${TEST_DIR}/managed-policy" "${TEST_DIR}/empty-home"
          unset RIOTBOX_PROMPT
          export RIOTBOX_MANAGED_POLICY_DIR="${TEST_DIR}/managed-policy"
          saved_etc="/etc/riotbox/CLAUDE.md"
          moved_etc=false
          if [ -f "${saved_etc}" ]; then
            sudo mv "${saved_etc}" "${saved_etc}.bak" 2>/dev/null && moved_etc=true
          fi
          HOME="${TEST_DIR}/empty-home" \
            source "{{.riotbox_dir}}/container/inject-claude-md.sh"
          if [ "${moved_etc}" = true ]; then
            sudo mv "${saved_etc}.bak" "${saved_etc}" 2>/dev/null
          fi
          if [ -f "${TEST_DIR}/managed-policy/CLAUDE.md" ]; then
            echo "FAIL: CLAUDE.md should not have been created"
            exit 1
          fi
          echo "no_file_created=true"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "no_file_created=true"
