name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Ensure podman is available
        run: command -v podman || sudo apt-get update && sudo apt-get install -y podman

      - name: Run tests
        run: just test
