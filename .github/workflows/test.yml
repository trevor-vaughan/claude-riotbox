name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install task
        run: |
          sudo sh -c 'curl -sL https://taskfile.dev/install.sh | sh -s -- -b /usr/local/bin'
          task --version

      - name: Ensure podman is available
        run: command -v podman || sudo apt-get update && sudo apt-get install -y podman

      - name: Run tests
        run: task test
