---
# Hadolint configuration for the RiotBox project.
# These rules are suppressed globally because they do not apply to this
# developer-environment image built on CentOS Stream 10 (a rolling distro).
#
# DL3013 — pip version pinning: developer tooling with large transitive dep
#           graphs; inline ignore on each RUN documents the per-case rationale.
# DL3016 — npm version pinning: mermaid-cli kept at latest for diagram syntax.
# DL3041 — dnf version pinning: Stream 10 is a rolling distribution; exact
#           package EVRs shift between composes. The FROM image digest (pinned
#           at the top of each Containerfile) is the supply-chain anchor.
# DL3062 — go install version pinning: gopls tracks the active Go toolchain;
#           pinning a specific semver diverges from the installed Go version.
# DL4006 — SHELL pipefail: pipefail is supplied by inlining
#           `bash -o pipefail -c '…'` in each piped RUN (the SHELL
#           directive doesn't survive in OCI image config). Without
#           SHELL, hadolint can't see that pipefail is applied. The
#           rule is suppressed because the per-RUN bash invocation
#           makes its analysis incorrect for this image.
# DL3059 — multiple consecutive RUNs: tools-stage installers (trivy,
#           grype, syft, task, venom) and the agent installers
#           (opencode, claude) are each a separate RUN by design so a
#           single installer churn doesn't invalidate the rest of the
#           layer cache. Consolidation would trade layer-cache hit rate
#           for a slightly smaller image, which is the wrong tradeoff
#           for this image's iteration cadence.
ignored:
  - DL3013
  - DL3016
  - DL3041
  - DL3062
  - DL4006
  - DL3059
