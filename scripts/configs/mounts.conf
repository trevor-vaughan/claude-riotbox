# riotbox-config-version: 1
# ~/.config/claude-riotbox/mounts.conf — Extra host paths to mount into the container.
#
# Each line is a file or directory to bind-mount read-only (:ro,z).
# Paths are relative to $HOME unless they start with / or ~.
# Lines starting with # are comments; blank lines are ignored.
#
# The container NEVER auto-mounts sensitive directories (.ssh, .gnupg,
# .kube, .aws, cloud credentials). Use this file to explicitly mount
# only what the container needs — typically registry auth tokens or
# tool configs that aren't baked into the image at build time.
#
# See also: scripts/detect-mounts.sh for the full mount logic.
# ─────────────────────────────────────────────────────────────────────────

# ── Package registry credentials ─────────────────────────────────────────
# If you use private npm/yarn/pip registries, mount the auth config so
# Claude can install packages. Auth tokens are stripped from configs at
# build time, so runtime mounts are the recommended way to provide them.
#
# .npmrc
# .yarnrc.yml
# .config/pip/pip.conf

# ── Build tool configs ───────────────────────────────────────────────────
# Maven settings, Gradle properties, etc.
#
# .m2/settings.xml
# .gradle/gradle.properties

# ── Other ────────────────────────────────────────────────────────────────
# Any file or directory. Absolute paths work too:
#
# /etc/ssl/certs/custom-ca.pem
