# riotbox-config-version: 1
# ~/.config/claude-riotbox/plugins.conf — Marketplace plugins to install.
#
# List one Claude Code plugin name per line. These are installed from the
# configured marketplace on first container startup. Already-installed
# plugins are skipped on subsequent runs (no Node.js spawn overhead).
#
# This file is ignored when the RIOTBOX_PLUGINS environment variable is
# set (comma-separated list), which completely replaces this file.
#
# Plugin names must match the marketplace identifier exactly (e.g.
# "superpowers", "ralph-loop"). Invalid names are logged and skipped.
# ─────────────────────────────────────────────────────────────────────────

# superpowers
# ralph-loop
